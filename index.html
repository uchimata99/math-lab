    const [n1, d1] = makeFrac(); const [n2, d2] = makeFrac(); const [sn, sd] = simplify(n1 * n2, d1 * d2);
    const steps = ["מונה כפול מונה, מכנה כפול מכנה", `${n1} × ${n2} = ${n1 * n2}`, `${d1} × ${d2} = ${d1 * d2}`, `= ${n1 * n2}/${d1 * d2}`];

      prompt: "כפל שברים — תשובה מצומצמת:", check: (x) => fracEqual(x, sn, sd),

  }
  let [n1, d1] = makeFrac(); let [n2, d2] = makeFrac();
  if (Math.random() < 0.25) { const k = ri(2, 3); n2 = n1 * k; d2 = d1 * k; }
  const left = n1 * d2, right = n2 * d1; const ans = left > right ? ">" : left < right ? "<" : "=";
  return { kind: "compare", expr: [{ t: "frac", n: n1, d: d1 }, { t: "op", v: "?" }, { t: "frac", n: n2, d: d2 }],
    prompt: "איזה סימן מתאים בין השברים? בחרי >, < או =:", check: (x) => ("" + x).trim() === ans, answerText: ans,
    hint: "הביאו למכנה משותף והשוו את המונים.",
    explanation: ["מביאים למכנה משותף ומשווים מונים", `${left}/${d1 * d2}  מול  ${right}/${d1 * d2}`, `הסימן המתאים: ${ans}`] };
}

/* ---------- חזקות וגורמים ראשוניים ---------- */
const SUP = { "0": "⁰", "1": "¹", "2": "²", "3": "³", "4": "⁴", "5": "⁵", "6": "⁶", "7": "⁷", "8": "⁸", "9": "⁹" };
const sup = (n) => ("" + n).split("").map((d) => SUP[d] || d).join("");
function isPrimeN(n) { if (n < 2) return false; for (let i = 2; i * i <= n; i++) if (n % i === 0) return false; return true; }
function factorize(n) { const f = []; let m = n; for (let p = 2; p <= m; p++) { while (m % p === 0) { f.push(p); m /= p; } } return f; }
function smallestPrime(n) { for (let p = 2; p <= n; p++) if (n % p === 0) return p; return n; }
/* גיוון: שומרים את המספר האחרון כדי לא לחזור עליו פעמיים ברצף */
let primeLast = -1;
const setLast = (n) => { primeLast = n; return n; };
/* מספר פריק אקראי בטווח [min,max] — אחיד על כל הפריקים, לגיוון רחב.
   pred — תנאי נוסף (למשל "קשה יותר"). */
function randComposite(min, max, pred) {
  if (min < 4) min = 4;
  for (let t = 0; t < 800; t++) {
    const n = ri(min, max);
    if (n === primeLast || isPrimeN(n) || (pred && !pred(n))) continue;
    return setLast(n);
  }
  for (let n = min; n <= max; n++) if (n !== primeLast && !isPrimeN(n) && (!pred || pred(n))) return setLast(n);
  return setLast(min % 2 === 0 ? min : min + 1);
}
/* מספר שלם אקראי בטווח, עם הימנעות מחזרה על האחרון */
function randInt(min, max) {
  for (let t = 0; t < 60; t++) { const n = ri(min, max); if (n !== primeLast) return setLast(n); }
  return setLast(ri(min, max));
}

function genPower(level) {
  if (level >= 1 && Math.random() < 0.25) {
    const opts = level === 1 ? [[2, 2], [3, 2], [2, 3], [2, 4], [5, 2], [3, 3], [4, 2]] : [[2, 5], [2, 6], [3, 3], [3, 4], [5, 3], [6, 3], [2, 7], [10, 2]];
    const [b1, e1] = pick(opts); const [b2, e2] = pick(opts);
    const v1 = Math.pow(b1, e1), v2 = Math.pow(b2, e2);
    const ans = v1 > v2 ? ">" : v1 < v2 ? "<" : "=";
    return { kind: "compare", expr: [{ t: "v", v: `${b1}${sup(e1)}` }, { t: "op", v: "?" }, { t: "v", v: `${b2}${sup(e2)}` }],
      prompt: "איזה סימן מתאים בין החזקות?", check: (x) => ("" + x).trim() === ans, answerText: ans,
      hint: "חשבי כל חזקה בנפרד, ואז השווי.",
      explanation: [`${b1}${sup(e1)} = ${v1}`, `${b2}${sup(e2)} = ${v2}`, `הסימן המתאים: ${ans}`] };
  }
  let b, e;
  if (level === 0) { e = pick([2, 2, 2, 3]); b = e === 3 ? ri(2, 4) : ri(2, 10); }
  else if (level === 1) { const o = pick([[2, 4], [2, 5], [3, 3], [4, 3], [5, 2], [6, 2], [7, 2], [2, 6], [3, 4]]); b = o[0]; e = o[1]; }
  else { const o = pick([[2, 7], [2, 8], [3, 5], [5, 3], [6, 3], [7, 3], [10, 3], [2, 9]]); b = o[0]; e = o[1]; }
  const val = Math.pow(b, e);
  return { kind: "number", expr: [{ t: "v", v: `${b}${sup(e)} =` }], prompt: "חשבי את החזקה:",
    check: (x) => intEqual(x, val), answerText: `${val}`,
    hint: "חזקה היא כפל חוזר: הבסיס כפול עצמו, מספר פעמים כמו המעריך.",
    explanation: [`${b}${sup(e)} פירושו ${b} כפול עצמו ${e} פעמים`, `${Array(e).fill(b).join(" × ")}`, `= ${val}`] };
}

function parseFactors(str) {
  str = ("" + str).replace(/\s/g, "");
  if (!str) return null;
  const parts = str.split(/[×x*]/);
  const nums = [];
  for (const p of parts) { if (!/^\d+$/.test(p)) return null; nums.push(Number(p)); }
  return nums;
}
function genPrime(level) {
  /* ---------- חימום: זיהוי ראשוני/פריק וגורם קטן ביותר ---------- */
  if (level === 0) {
    const mode = pick(["isprime", "isprime", "primecomp", "smallest", "smallest"]);
    if (mode === "isprime") {
      const n = randInt(2, 40); const p = isPrimeN(n);
      return { kind: "choice", expr: [{ t: "v", v: `${n}` }], choices: ["כן", "לא"],
        prompt: `האם ${n} מספר ראשוני?`, check: (x) => x === (p ? "כן" : "לא"), answerText: p ? "כן" : "לא",
        hint: "מספר ראשוני מתחלק רק ב-1 ובעצמו.",
        explanation: [p ? `${n} מתחלק רק ב-1 ובעצמו — ראשוני` : `${n} = ${factorize(n).join(" × ")} — לא ראשוני`] };
    }
    if (mode === "primecomp") {
      const n = randInt(4, 50); const p = isPrimeN(n);
      return { kind: "choice", expr: [{ t: "v", v: `${n}` }], choices: ["ראשוני", "פריק"],
        prompt: `${n} — ראשוני או פריק?`, check: (x) => x === (p ? "ראשוני" : "פריק"), answerText: p ? "ראשוני" : "פריק",
        hint: "פריק = אפשר לכתוב ככפל של מספרים קטנים יותר. ראשוני = אי אפשר.",
        explanation: [p ? `${n} מתחלק רק ב-1 ובעצמו — ראשוני` : `${n} = ${factorize(n).join(" × ")} — פריק`] };
    }
    const n = randComposite(10, 60); const spf = smallestPrime(n);
    return { kind: "number", expr: [{ t: "v", v: `${n}` }], prompt: "מהו הגורם הראשוני הקטן ביותר?",
      check: (x) => intEqual(x, spf), answerText: `${spf}`,
      hint: "בדקי לפי הסדר: מתחלק ב-2? ב-3? ב-5?…",
      explanation: [`מחפשים את הראשוני הקטן ביותר שמחלק את ${n}`, `${n} ÷ ${spf} = ${n / spf}`, `הגורם הוא ${spf}`] };
  }

  /* ---------- אתגר / מתקדם: מספרים בין 0 ל-100, מגוון סוגי שאלות ---------- */
  const hard = level >= 2;
  // ברמה המתקדמת בוחרים מספרים "קשים יותר": ≥3 גורמים, או גורם ראשוני גדול (≥11)
  const pred = hard ? ((x) => { const f = factorize(x); return f.length >= 3 || f[f.length - 1] >= 11; }) : null;
  const n = randComposite(hard ? 24 : 10, hard ? 100 : 99, pred);
  const cf = factorize(n);
  const mode = pick(hard
    ? ["factorize", "factorize", "largest", "count", "complete"]
    : ["factorize", "factorize", "factorize", "smallest", "largest", "complete"]);

  if (mode === "smallest") {
    const spf = cf[0];
    return { kind: "number", expr: [{ t: "v", v: `${n}` }], prompt: "מהו הגורם הראשוני הקטן ביותר?",
      check: (x) => intEqual(x, spf), answerText: `${spf}`,
      hint: "בדקי לפי הסדר: מתחלק ב-2? ב-3? ב-5? ב-7?…",
      explanation: [`${n} = ${cf.join(" × ")}`, `הגורם הראשוני הקטן ביותר הוא ${spf}`] };
  }
  if (mode === "largest") {
    const lpf = cf[cf.length - 1];
    return { kind: "number", expr: [{ t: "v", v: `${n}` }], prompt: "מהו הגורם הראשוני הגדול ביותר?",
      check: (x) => intEqual(x, lpf), answerText: `${lpf}`,
      hint: "מפרקים את המספר לגורמים ראשוניים, ובוחרים את הגדול שבהם.",
      explanation: [`${n} = ${cf.join(" × ")}`, `הגורם הראשוני הגדול ביותר הוא ${lpf}`] };
  }
  if (mode === "count") {
    const c = cf.length;
    return { kind: "number", expr: [{ t: "v", v: `${n}` }], prompt: "מכמה גורמים ראשוניים מורכב המספר (כולל חזרות)?",
      check: (x) => intEqual(x, c), answerText: `${c}`,
      hint: "פרקי את המספר, וספרי כמה ראשוניים יש בפירוק (גם אם הם חוזרים).",
      explanation: [`${n} = ${cf.join(" × ")}`, `סך הכול ${c} גורמים ראשוניים`] };
  }
  if (mode === "complete") {
    const idx = ri(0, cf.length - 1); const missing = cf[idx];
    const shown = cf.map((p, i) => (i === idx ? "▢" : p)).join(" × ");
    return { kind: "number", expr: [{ t: "v", v: `${n} = ${shown}` }], prompt: "איזה גורם ראשוני חסר במקום ▢?",
      check: (x) => intEqual(x, missing), answerText: `${missing}`,
      hint: "כפלי את הגורמים הידועים, ובדקי במה צריך עוד להכפיל כדי לקבל את המספר.",
      explanation: [`${n} = ${cf.join(" × ")}`, `הגורם החסר הוא ${missing}`] };
  }
  // ברירת מחדל: פירוק מלא לגורמים ראשוניים
  const correct = cf.join(" × ");
  return { kind: "factors", expr: [{ t: "v", v: `${n}` }],
    prompt: "כתבי את הפירוק לגורמים ראשוניים (השתמשי בכפתור ×):",
    check: (x) => { const f = parseFactors(x); if (!f) return false; const s = f.slice().sort((a, b) => a - b); return s.length === cf.length && s.every((v, i) => v === cf[i]); },
    answerText: correct,
    hint: "מפרקים שוב ושוב לגורמים, עד שכל הגורמים ראשוניים, וכותבים אותם עם × ביניהם.",
    explanation: ["מפרקים עד שכל הגורמים ראשוניים", `${n} = ${correct}`] };
}

function genG2AddSub(level) {
  // עלייה מדורגת: תוצאות עד 10 → 20 → 30 → 50 → 100
  const cap = [10, 20, 30, 50, 100][Math.min(level, 4)];
  // גיוון: ברמות הגבוהות לפעמים חיבור של שלושה מספרים
  if (level >= 2 && Math.random() < 0.25) {
    const a = ri(1, Math.max(2, Math.floor(cap / 3)));
    const b = ri(1, Math.max(2, Math.floor(cap / 3)));
    const c = ri(1, Math.max(1, cap - a - b));
    const val = a + b + c;
    return { kind: "number", expr: [{ t: "v", v: `${a} + ${b} + ${c} =` }], prompt: "כמה זה ביחד?",
      check: (v) => intEqual(v, val), answerText: `${val}`,
      hint: "מחברים שניים, ואז מוסיפים את השלישי.",
      explanation: [`${a} + ${b} = ${a + b}`, `${a + b} + ${c}`, `= ${val}`] };
  }
  const op = pick(["+", "−"]);
  let a, b, val;
  if (op === "+") { a = ri(1, cap - 1); b = ri(1, cap - a); val = a + b; }
  else { a = ri(2, cap); b = ri(1, a - 1); val = a - b; }
  return { kind: "number", expr: [{ t: "v", v: `${a} ${op} ${b} =` }],
    prompt: op === "+" ? "כמה זה ביחד?" : "כמה נשאר?",
    check: (v) => intEqual(v, val), answerText: `${val}`,
    hint: op === "+" ? "אפשר לספור קדימה מהמספר הגדול." : "אפשר לספור אחורה.",
    explanation: [op === "+" ? "מחברים את שני המספרים" : "מחסרים מהמספר הגדול", `${a} ${op} ${b}`, `= ${val}`] };
}
function genG2Mul(level) {
  const a = level === 0 ? ri(2, 4) : level === 1 ? ri(2, 5) : ri(2, 6);

  return { kind: "number", expr: [{ t: "v", v: `${a} × ${b} =` }],

}

function genG2Seq(level) {
  const steps = level === 0 ? [1, 2, 5, 10] : level === 1 ? [2, 3, 4, 5, 10] : [2, 3, 4, 6, 7, 10];
  const step = pick(steps);
  const down = level >= 1 && Math.random() < 0.4;
  const len = 4;
  const start = down ? ri(len * step, 100) : ri(0, 20);
  const seq = [];
  for (let i = 0; i < len; i++) seq.push(start + (down ? -step : step) * i);
  const next = start + (down ? -step : step) * len;
  return { kind: "number", expr: [{ t: "v", v: `${seq.join(", ")}, __` }],
    prompt: down ? "המשיכי את הסדרה (יורדת):" : "המשיכי את הסדרה:",
    check: (x) => intEqual(x, next), answerText: `${next}`,
    hint: `ההפרש הקבוע בין המספרים הוא ${step}.`,
    explanation: [`כל פעם ${down ? "מורידים" : "מוסיפים"} ${step}`, `${seq[len - 1]} ${down ? "−" : "+"} ${step}`, `= ${next}`] };
}

/* ---------- זיהוי מכשיר ---------- */
function useDevice() {
  const calc = () => {
    if (typeof window === "undefined") return { isTablet: true, landscape: true };
    const w = window.innerWidth, h = window.innerHeight;
    return { isTablet: Math.min(w, h) >= 600, landscape: w > h };
  };
  const [d, setD] = useState(calc);
  useEffect(() => {
    const on = () => setD(calc());
    window.addEventListener("resize", on);
    window.addEventListener("orientationchange", on);
    return () => { window.removeEventListener("resize", on); window.removeEventListener("orientationchange", on); };
  }, []);
  return d;
}

/* ---------- קו מספרים נגרר (המחשה מוחשית: גרירה עדיפה על הקשה) ---------- */
function NumberLine({ max, value, setValue, color, isTablet }) {
  const ref = useRef(null);
  const drag = useRef(false);
  const W = isTablet ? 560 : 330, H = 96, padX = 26, baseY = 60;
  const innerW = W - padX * 2;
  const labelStep = max <= 20 ? (max <= 10 ? 1 : 2) : 5;
  const toX = (v) => padX + (v / max) * innerW;
  const fromEvt = (e) => {
    const r = ref.current.getBoundingClientRect();
    const xv = (e.clientX - r.left) / r.width * W;
    return Math.max(0, Math.min(max, Math.round(((xv - padX) / innerW) * max)));
  };
  const set = (e) => { e.preventDefault(); setValue(fromEvt(e)); };
  const ticks = [];
  for (let v = 0; v <= max; v++) {
    const x = toX(v); const major = v % labelStep === 0;
    ticks.push(<line key={"t" + v} x1={x} y1={baseY - (major ? 9 : 5)} x2={x} y2={baseY + (major ? 9 : 5)} stroke="#cbd5e1" strokeWidth={major ? 2 : 1} />);
    if (major) ticks.push(<text key={"n" + v} x={x} y={baseY + 27} textAnchor="middle" fontSize="13" fontWeight="700" fill="#64748b">{v}</text>);
  }
  const has = value != null && value !== "";
  const mx = toX(has ? Number(value) : 0);
  return (
    <svg ref={ref} width="100%" viewBox={`0 0 ${W} ${H}`} style={{ touchAction: "none", cursor: "pointer", maxWidth: W, userSelect: "none" }}
      onPointerDown={(e) => { drag.current = true; try { e.currentTarget.setPointerCapture(e.pointerId); } catch (_) {} set(e); }}
      onPointerMove={(e) => { if (drag.current) set(e); }}
      onPointerUp={() => { drag.current = false; }} onPointerCancel={() => { drag.current = false; }}>
      <line x1={padX} y1={baseY} x2={W - padX} y2={baseY} stroke="#94a3b8" strokeWidth="3" strokeLinecap="round" />
      {ticks}
      {has && (
        <g>
          <line x1={mx} y1={baseY} x2={mx} y2={26} stroke={color} strokeWidth="3" />
          <rect x={mx - 20} y={4} width="40" height="24" rx="7" fill={color} />
          <text x={mx} y={21} textAnchor="middle" fontSize="16" fontWeight="800" fill="#fff">{value}</text>
          <circle cx={mx} cy={baseY} r="12" fill={color} stroke="#fff" strokeWidth="3" />
        </g>
      )}
    </svg>
  );
}

/* ---------- שביל מסע (קונספט הרפתקה) ---------- */
function JourneyPath({ levelIdx, color, isTablet, max = MAXLVL }) {
  const nodes = max + 1;
  const W = isTablet ? 340 : 290;
  const stepH = (isTablet ? 96 : 82) * (nodes > 3 ? 0.78 : 1);
  const topPad = 70, botPad = 50;
  const H = topPad + botPad + (nodes - 1) * stepH;
  const cx = (i) => (i % 2 === 0 ? W * 0.30 : W * 0.70);
  const cy = (i) => H - botPad - i * stepH;
  const R = isTablet ? 28 : 24;
  const done = levelIdx >= max;
  const segs = [];
  for (let i = 0; i < nodes - 1; i++) {
    const reached = (i + 1) <= levelIdx;
    segs.push(<line key={"s" + i} x1={cx(i)} y1={cy(i)} x2={cx(i + 1)} y2={cy(i + 1)}
      stroke={reached ? color : "#e2e8f0"} strokeWidth="8" strokeLinecap="round" strokeDasharray={reached ? "0" : "2 13"} />);
  }
  const tx = cx(nodes - 1);
  const ty = cy(nodes - 1) - (isTablet ? 52 : 46);
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ maxWidth: W, display: "block", margin: "0 auto" }}>
      {segs}
      <g transform={`translate(${tx - (isTablet ? 17 : 15)},${ty - (isTablet ? 17 : 15)})`}>
        <Icon name="star" size={isTablet ? 34 : 30} color={done ? "#f59e0b" : "#cbd5e1"} stroke={2} />
      </g>
      {Array.from({ length: nodes }).map((_, i) => {
        const x = cx(i), y = cy(i);
        const st = i < levelIdx ? "done" : i === levelIdx ? "cur" : "lock";
        const fill = st === "lock" ? "#fff" : color;
        return (
          <g key={i}>
            {st === "cur" && <circle cx={x} cy={y} r={R + 7} fill="none" stroke={color} strokeWidth="3" opacity="0.3" />}
            <circle cx={x} cy={y} r={R} fill={fill} stroke={st === "lock" ? "#e2e8f0" : color} strokeWidth="3" />
            <text x={x} y={y + (isTablet ? 7 : 6)} textAnchor="middle" fontSize={isTablet ? 21 : 18} fontWeight="800" fill={st === "lock" ? "#cbd5e1" : "#fff"}>{i + 1}</text>
            <text x={x} y={y + R + (isTablet ? 22 : 19)} textAnchor="middle" fontSize={isTablet ? 14 : 12} fontWeight="700" fill={st === "lock" ? "#cbd5e1" : "#64748b"}>{levelName(i)}</text>
          </g>
        );
      })}
    </svg>
  );
}

/* ---------- הקראה בקול: זיהוי דיבור ---------- */
function SpeakCheck({ target, onDone, color, isTablet }) {
  const [state, setState] = useState("idle"); // idle | listening | denied | error
  const [heard, setHeard] = useState("");
  const recRef = useRef(null);
  const SR = (typeof window !== "undefined") && (window.SpeechRecognition || window.webkitSpeechRecognition);
  useEffect(() => () => { try { recRef.current && recRef.current.abort(); } catch (_) {} }, []);
  const listen = () => {
    if (!SR) return;
    try {
      const r = new SR(); recRef.current = r;
      r.lang = "he-IL"; r.interimResults = false; r.maxAlternatives = 4;
      setHeard(""); setState("listening");
      r.onresult = (e) => {
        const res = e.results[0]; const alts = [];
        for (let i = 0; i < res.length; i++) alts.push(res[i].transcript);
        const best = alts[0] || ""; setHeard(best); setState("idle");
        onDone(alts.some((a) => speakMatch(a, target)), best);
      };
      r.onerror = (ev) => { setState(ev.error === "not-allowed" || ev.error === "service-not-allowed" ? "denied" : "error"); };
      r.onend = () => { setState((s) => (s === "listening" ? "idle" : s)); };
      r.start();
    } catch (_) { setState("error"); }
  };
  const bigBtn = { fontFamily: "inherit", cursor: "pointer", border: "none", borderRadius: 16, padding: isTablet ? "16px 30px" : "13px 24px", fontSize: isTablet ? 22 : 19, fontWeight: 800, color: "#fff", background: color, boxShadow: "0 6px 16px rgba(2,6,23,0.14)", touchAction: "manipulation" };
  if (!SR) {
    return (
      <div style={{ textAlign: "center", display: "flex", flexDirection: "column", gap: 12, alignItems: "center" }}>
        <p style={{ color: "#6b7280", fontSize: isTablet ? 17 : 15, maxWidth: 380, lineHeight: 1.5 }}>הַמַּכְשִׁיר לֹא תּוֹמֵךְ בְּזִיהוּי קוֹל. קִרְאִי אֶת הַמִּלָּה בְּקוֹל, וְאָז לַחֲצִי "קָרָאתִי!".</p>
        <button onClick={() => onDone(true, "")} style={bigBtn}>✓ קָרָאתִי!</button>
      </div>
    );
  }
  const listening = state === "listening";
  return (
    <div style={{ textAlign: "center", display: "flex", flexDirection: "column", gap: 12, alignItems: "center" }}>
      <button onClick={listen} disabled={listening} aria-label="הקראה בקול"
        style={{ fontFamily: "inherit", cursor: listening ? "default" : "pointer", border: "none", borderRadius: "50%",
          width: isTablet ? 96 : 84, height: isTablet ? 96 : 84, background: listening ? "#ff4d4f" : color,
          boxShadow: listening ? "0 0 0 8px rgba(255,77,79,0.18)" : "0 8px 20px rgba(2,6,23,0.18)",
          display: "flex", alignItems: "center", justifyContent: "center", touchAction: "manipulation", transition: "box-shadow .15s" }}>
        <Icon name="mic" size={isTablet ? 44 : 38} color="#fff" stroke={2} />
      </button>
      <div style={{ fontWeight: 800, color: listening ? "#ff4d4f" : color, fontSize: isTablet ? 18 : 16 }}>
        {listening ? "מַקְשִׁיבָה… דַּבְּרִי עַכְשָׁיו" : "לַחֲצִי וְהַקְרִיאִי בְּקוֹל"}
      </div>
      {heard && !listening && <div dir="rtl" style={{ color: "#6b7280", fontSize: isTablet ? 16 : 14 }}>שָׁמַעְתִּי: «{heard}»</div>}
      {state === "denied" && <div style={{ color: "#cf1322", fontSize: isTablet ? 15 : 13 }}>צָרִיךְ לְאַשֵּׁר גִּישָׁה לַמִּיקְרוֹפוֹן בַּדַּפְדְּפָן.</div>}
      {state === "error" && <div style={{ color: "#cf1322", fontSize: isTablet ? 15 : 13 }}>לֹא הִצְלַחְתִּי לִשְׁמֹעַ — נַסִּי שׁוּב.</div>}
    </div>
  );
}

function App() {
  const { isTablet, landscape } = useDevice();
  const twoCol = isTablet && landscape;

  const [screen, setScreen] = useState("home");
  const [topic, setTopic] = useState(null);
  const [level, setLevel] = useState(null);
  const [problem, setProblem] = useState(null);
  const [input, setInput] = useState("");
  const [feedback, setFeedback] = useState(null);
  const [showHint, setShowHint] = useState(false);
  const [showSol, setShowSol] = useState(false);
  const [players, setPlayers] = useState({});
  const [current, setCurrent] = useState(null);
  const [course, setCourse] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [leveledUp, setLeveledUp] = useState(false);
  const [parentOk, setParentOk] = useState(false);
  const [pq, setPq] = useState({ a: 6, b: 7 });
  const [voiceMiss, setVoiceMiss] = useState(false);

  useEffect(() => {
    const s = typeof window !== "undefined" && window.speechSynthesis;
    if (!s) return;
    const check = () => { const vs = s.getVoices(); if (vs && vs.length) setVoiceMiss(!vs.some((v) => /he|iw/i.test(v.lang))); };
    check();
    if (s.addEventListener) { s.addEventListener("voiceschanged", check); return () => s.removeEventListener("voiceschanged", check); }
  }, []);

  useEffect(() => {
    const data = readStore();
    if (data && data.players) {
      setPlayers(data.players);
      setCurrent(data.current && data.players[data.current] ? data.current : null);
    }
    setLoaded(true);
  }, []);

  const cur = (current && players[current]) || blankP();
  const stars = cur.stars, streak = cur.streak, solved = cur.solved;

  function persist(np, cu) { writeStore({ players: np, current: cu }); }
  function pickPlayer(n) { setCurrent(n); persist(players, n); }
  function addPlayer(n) {
    const np = players[n] ? players : { ...players, [n]: blankP() };
    setPlayers(np); setCurrent(n); persist(np, n);
  }
  function switchPlayer() { setScreen("home"); setProblem(null); setCourse(null); setCurrent(null); persist(players, null); }
  const adaptive = course === ADAPTIVE_COURSE;
  function applyResult(ok) {
    const c = players[current] || blankP();
    const prog = { ...(c.prog || {}) };
    let bumped = false, lvlNow = 0;
    if (adaptive && topic) {
      const t = prog[topic.id] || { lvl: 0, xp: 0 };
      let lvl = t.lvl, xp = t.xp;
      if (ok) { xp += 1; if (xp >= NEED && lvl < maxLvlOf(topic)) { lvl += 1; xp = 0; bumped = true; } }
      else { xp = Math.max(0, xp - 1); }
      prog[topic.id] = { lvl, xp }; lvlNow = lvl;
    }
    const gain = ok ? (adaptive ? 1 + lvlNow : (level ? level.stars : 1)) : 0;
    const nx = ok ? { ...c, stars: c.stars + gain, streak: c.streak + 1, solved: c.solved + 1, prog }
                  : { ...c, streak: 0, prog };
    const np = { ...players, [current]: nx };
    setPlayers(np); persist(np, current);
    if (bumped) { setLeveledUp(true); setLevel(syntheticLevel(lvlNow)); }
  }
  function resetQ() { setInput(""); setFeedback(null); setShowHint(false); setShowSol(false); setLeveledUp(false); }
  function startProblem(t, lvl) { setProblem(genFresh(t, lvl)); resetQ(); }

  const newProblem = useCallback((t, l) => { setProblem(genFresh(t, l.id)); resetQ(); }, []);
  // התרגיל הבא — ברמה הסתגלנית העדכנית (כיתה ב') או ברמה שנבחרה (אחרת)
  function nextProblem() {
    if (adaptive && topic) {
      const lvl = Math.min(getProg(players[current], topic.id).lvl, maxLvlOf(topic));
      setLevel(syntheticLevel(lvl)); startProblem(topic, lvl);
    } else { startProblem(topic, level.id); }
  }
  function startLevel(t, l) {
    setTopic(t); setLevel(l); setScreen("play"); startProblem(t, l.id);
  }
  function startAdaptive(t) {
    setTopic(t); setScreen("play");
    const lvl = Math.min(getProg(players[current], t.id).lvl, maxLvlOf(t));
    setLevel(syntheticLevel(lvl)); startProblem(t, lvl);
  }
  function setTopicLevel(topicId, lvl, max) {
    const c = players[current] || blankP();
    const prog = { ...(c.prog || {}) };
    prog[topicId] = { lvl: Math.max(0, Math.min(max == null ? MAXLVL : max, lvl)), xp: 0 };
    const np = { ...players, [current]: { ...c, prog } };
    setPlayers(np); persist(np, current);
  }
  function handleKey(k) {
    if (k === "submit") return check();
    if (feedback === "ok") return;
    if (k === "clear") return setInput("");
    if (k === "back") return setInput((s) => s.slice(0, -1));
    if (problem.kind === "compare") return setInput(k);
    const cap = problem.kind === "factors" ? 24 : 7;
    setInput((s) => (s.length < cap ? s + k : s));
  }
  function check() {
    if (!problem || input.trim() === "") return;
    const ok = problem.check(input);
    setFeedback(ok ? "ok" : "no");
    applyResult(ok);
  }
  const padMode = problem ? problem.kind : "number";

  const S = {
    homeTitle: isTablet ? (landscape ? 54 : 46) : 38,
    homeCols: twoCol ? "repeat(5,1fr)" : isTablet ? "repeat(3,1fr)" : "repeat(2,1fr)",
    levelCols: isTablet ? "repeat(3,1fr)" : "1fr",
    expr: twoCol ? 50 : isTablet ? 44 : 34,
    prompt: isTablet ? 20 : 16,
    emoji: isTablet ? 54 : 40,
    topicTitle: isTablet ? 22 : 19,
  };
  const sp = { stars, streak, solved, isTablet, landscape, player: current, onSwitch: switchPlayer };

  if (!loaded) return null;
  if (!current) return <PlayerSelect players={players} onPick={pickPlayer} onAdd={addPlayer} />;
  if (!course) return <WorkbookSelect courses={COURSES} onPick={setCourse} onBack={switchPlayer} />;
  const courseObj = COURSES.find((c) => c.id === course) || COURSES[0];
  const courseTopics = courseObj.topics;
  const backToCourses = () => { setScreen("home"); setProblem(null); setCourse(null); };

  /* ---------- בית ---------- */
  if (screen === "home") {
    return (
      <Shell {...sp}>
        <BackBtn onClick={backToCourses} isTablet={isTablet} />
        <h1 style={{ fontFamily: "'Rubik', sans-serif", fontSize: S.homeTitle, margin: "4px 0 4px", color: "#1f2937", textAlign: "center", display: "inline-flex", alignItems: "center", gap: 10, justifyContent: "center", width: "100%" }}><Icon name={COURSE_ICONS[courseObj.id]} size={S.homeTitle * 0.9} color={courseObj.color} /> {courseObj.title}</h1>
        <p style={{ textAlign: "center", color: "#6b7280", margin: "0 0 22px", fontSize: isTablet ? 21 : 17 }}>{adaptive ? "בחרי נושא וצאי למסע — הרמה עולה לבד ככל שמתאמנים!" : "בחרי נושא, ואז רמת אתגר. בהצלחה!"}</p>
        {course === "reading" && voiceMiss && (
          <div style={{ maxWidth: 580, margin: "0 auto 18px", background: "#fffbe6", border: "1px solid #ffe58f", borderRadius: 14, padding: "10px 16px", fontSize: isTablet ? 15 : 13, color: "#8c6d1f", textAlign: "center", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, lineHeight: 1.5 }}>
            <Icon name="bulb" size={18} color="#d4a017" /><span>לא נמצא קול עברי במכשיר. כדי לשמוע את ההקראה, הפעילו קול עברית בהגדרות המכשיר (נגישות → טקסט לדיבור).</span>
          </div>
        )}
        {adaptive && <div style={{ textAlign: "center", marginBottom: 18 }}><button onClick={() => { setParentOk(false); setPq({ a: ri(3, 9), b: ri(3, 9) }); setInput(""); setScreen("parentgate"); }} style={{ fontFamily: "inherit", cursor: "pointer", border: "1px solid #e5e7eb", background: "#fff", borderRadius: 14, padding: "8px 16px", fontSize: isTablet ? 15 : 13, fontWeight: 700, color: "#6b7280", display: "inline-flex", alignItems: "center", gap: 6, boxShadow: "0 3px 10px rgba(2,6,23,0.05)" }}><Icon name="user" size={16} color="#9ca3af" /> אזור הורים</button></div>}
        <div style={{ display: "grid", gridTemplateColumns: S.homeCols, gap: isTablet ? 18 : 14 }}>
          {courseTopics.map((t) => {
            const pr = adaptive ? getProg(cur, t.id) : null;
            return (
            <button key={t.id} onClick={() => { setTopic(t); setScreen(adaptive ? "journey" : "level"); }}
              style={{
                fontFamily: "inherit", cursor: "pointer", border: "none", borderRadius: 24,
                padding: isTablet ? "26px 14px 18px" : "20px 12px 14px", background: "#fff", boxShadow: "0 10px 26px rgba(2,6,23,0.07)",
                borderTop: `5px solid ${t.color}`, textAlign: "center",
                touchAction: "manipulation", userSelect: "none", WebkitTapHighlightColor: "transparent",
              }}>
              <div style={{ display: "flex", justifyContent: "center" }}><Icon name={topicIcon(t)} size={S.emoji} color={t.color} stroke={1.8} /></div>
              <div style={{ fontSize: S.topicTitle, fontWeight: 800, marginTop: 10, color: "#1f2937" }}>{t.title}</div>
              {pr && (
                <div style={{ marginTop: 8 }}>
                  <div style={{ fontSize: isTablet ? 13 : 11, fontWeight: 700, color: t.color, marginBottom: 4 }}>{levelName(pr.lvl)}</div>
                  <div style={{ height: 6, borderRadius: 99, background: "#eef2f7", overflow: "hidden" }}>
                    <div style={{ height: "100%", width: `${pr.lvl >= maxLvlOf(t) ? 100 : Math.round((pr.xp / NEED) * 100)}%`, background: t.color, borderRadius: 99 }} />
                  </div>
                </div>
              )}
            </button>
          ); })}
        </div>
      </Shell>
    );
  }

  /* ---------- בחירת רמה + דוגמה פתורה ---------- */
  if (screen === "level") {
    const ex = topic.example;
    return (
      <Shell {...sp}>
        <BackBtn onClick={() => setScreen("home")} isTablet={isTablet} />
        <div style={{ textAlign: "center", marginBottom: 18 }}>
          <div style={{ display: "flex", justifyContent: "center" }}><Icon name={topicIcon(topic)} size={isTablet ? 58 : 46} color={topic.color} stroke={1.8} /></div>
          <h2 style={{ fontFamily: "'Rubik', sans-serif", fontSize: isTablet ? 38 : 30, margin: "8px 0 4px", color: topic.color }}>{topic.title}</h2>
          <p style={{ color: "#6b7280", fontSize: isTablet ? 19 : 16, maxWidth: 620, margin: "8px auto 0", lineHeight: 1.6 }}>{topic.lesson}</p>
        </div>

        {/* כרטיס דוגמה פתורה — כל הדרך, שלב בכל שורה */}
        <div style={{
          maxWidth: 600, margin: "0 auto 22px", background: "#fff", borderRadius: 22,
          border: `2px dashed ${topic.color}`, padding: isTablet ? "22px 26px" : "18px 18px",
        }}>
          <div style={{ fontSize: isTablet ? 17 : 15, fontWeight: 800, color: topic.color, marginBottom: 12, display: "flex", alignItems: "center", justifyContent: "center", gap: 7 }}><Icon name="pencil" size={isTablet ? 18 : 16} color={topic.color} /> דוגמה פתורה — שלב אחר שלב</div>
          {ex.figure && <div style={{ display: "flex", justifyContent: "center", marginBottom: 12 }}><Figure fig={ex.figure} color={topic.color} /></div>}
          {ex.expr && ex.expr.length > 0 && (
            <div dir="ltr" style={{ fontSize: isTablet ? 30 : 26, fontWeight: 800, color: "#1f2937", display: "flex", justifyContent: "center", marginBottom: 14 }}>
              <MathLine parts={ex.expr} />
            </div>
          )}
          <div style={{ background: "#fafafa", borderRadius: 14, padding: isTablet ? "16px 20px" : "13px 16px" }}>
            <StepLines lines={ex.steps} big={isTablet} />
          </div>
          <div style={{ textAlign: "center", marginTop: 14 }}>
            <span style={{ background: "#f6ffed", color: "#389e0d", borderRadius: 12, padding: "6px 18px", fontSize: isTablet ? 20 : 18, fontWeight: 800, display: "inline-flex", alignItems: "center", gap: 4 }} dir="ltr">
              <span>תשובה:</span> {renderMathText(ex.answer, isTablet ? 0.9 : 0.85)}
            </span>
          </div>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: S.levelCols, gap: 16, maxWidth: 720, margin: "0 auto" }}>
          {LEVELS.map((l) => (
            <button key={l.id} onClick={() => startLevel(topic, l)}
              style={{
                fontFamily: "inherit", cursor: "pointer", border: "none", borderRadius: 20,
                padding: isTablet ? "24px 20px" : "18px 20px", background: "#fff", boxShadow: "0 6px 16px rgba(2,6,23,0.07)",
                display: "flex", alignItems: "center", justifyContent: "space-between",
                touchAction: "manipulation", userSelect: "none", WebkitTapHighlightColor: "transparent",
              }}>
              <span style={{ fontSize: isTablet ? 25 : 22, fontWeight: 800, color: "#1f2937" }}>{l.badge} {l.name}</span>
              <span style={{ display: "inline-flex", gap: 2 }}>{Array.from({ length: l.stars }).map((_, i) => <Icon key={i} name="star" size={isTablet ? 18 : 16} color="#fbbf24" stroke={2} />)}</span>
            </button>
          ))}
        </div>
      </Shell>
    );
  }

  /* ---------- מסך מסע (כיתה ב' — מודל לומד) ---------- */
  if (screen === "journey") {
    const pr = getProg(cur, topic.id);
    const remain = NEED - pr.xp;
    return (
      <Shell {...sp}>
        <BackBtn onClick={() => setScreen("home")} isTablet={isTablet} />
        <div style={{ textAlign: "center", marginBottom: 8 }}>
          <div style={{ display: "flex", justifyContent: "center" }}><Icon name={topicIcon(topic)} size={isTablet ? 52 : 42} color={topic.color} stroke={1.8} /></div>
          <h2 style={{ fontFamily: "'Rubik', sans-serif", fontSize: isTablet ? 34 : 28, margin: "6px 0 4px", color: topic.color }}>{topic.title}</h2>
          <p style={{ color: "#6b7280", fontSize: isTablet ? 18 : 15, maxWidth: 560, margin: "6px auto 0", lineHeight: 1.6 }}>{topic.lesson}</p>
        </div>
        <div style={{ maxWidth: 460, margin: "0 auto", background: "#fff", borderRadius: 26, boxShadow: "0 12px 30px rgba(2,6,23,0.06)", borderTop: `4px solid ${topic.color}`, padding: isTablet ? "22px 20px 26px" : "18px 16px 22px" }}>
          <div style={{ textAlign: "center", fontWeight: 800, fontSize: isTablet ? 18 : 16, color: topic.color, marginBottom: 6 }}>
            {pr.lvl >= maxLvlOf(topic) ? "כל הכבוד! הגעת לפסגה 🏆" : `${levelName(pr.lvl)} — עוד ${remain} ${remain === 1 ? "תשובה" : "תשובות"} לרמה הבאה`}
          </div>
          <JourneyPath levelIdx={pr.lvl} color={topic.color} isTablet={isTablet} max={maxLvlOf(topic)} />
          <button onClick={() => startAdaptive(topic)}
            style={{ display: "block", width: "100%", marginTop: 14, fontFamily: "inherit", cursor: "pointer", border: "none", borderRadius: 18,
              padding: isTablet ? "18px" : "15px", fontSize: isTablet ? 24 : 20, fontWeight: 800, background: topic.color, color: "#fff",
              boxShadow: "0 6px 16px rgba(2,6,23,0.14)", touchAction: "manipulation" }}>בואי נתרגל ←</button>
        </div>
      </Shell>
    );
  }

  /* ---------- שער הורים ---------- */
  if (screen === "parentgate") {
    const tryGate = () => { if (Number(input) === pq.a * pq.b) { setParentOk(true); setInput(""); setScreen("parent"); } else { setInput(""); } };
    return (
      <Shell {...sp}>
        <BackBtn onClick={() => setScreen("home")} isTablet={isTablet} />
        <div style={{ maxWidth: 420, margin: "40px auto 0", background: "#fff", borderRadius: 24, boxShadow: "0 12px 30px rgba(2,6,23,0.06)", padding: "28px 24px", textAlign: "center" }}>
          <div style={{ display: "flex", justifyContent: "center", marginBottom: 8 }}><Icon name="user" size={42} color="#9254de" /></div>
          <h2 style={{ fontFamily: "'Rubik', sans-serif", fontSize: isTablet ? 26 : 22, margin: "0 0 6px", color: "#1f2937" }}>אזור הורים</h2>
          <p style={{ color: "#6b7280", fontSize: isTablet ? 17 : 15, margin: "0 0 16px" }}>פתרו כדי להמשיך:</p>
          <div dir="ltr" style={{ fontSize: isTablet ? 34 : 28, fontWeight: 800, color: "#1f2937", marginBottom: 14 }}>{pq.a} × {pq.b} = ?</div>
          <input value={input} onChange={(e) => setInput(e.target.value.replace(/[^0-9]/g, ""))} onKeyDown={(e) => e.key === "Enter" && tryGate()}
            inputMode="numeric" autoFocus dir="ltr"
            style={{ width: 120, fontFamily: "inherit", fontSize: 26, fontWeight: 800, textAlign: "center", padding: "10px", borderRadius: 14, border: "2px solid #e5e7eb", outline: "none" }} />
          <button onClick={tryGate} style={{ display: "block", width: "100%", marginTop: 16, fontFamily: "inherit", cursor: "pointer", border: "none", borderRadius: 16, padding: "14px", fontSize: 20, fontWeight: 800, background: "#9254de", color: "#fff", boxShadow: "0 6px 16px rgba(2,6,23,0.14)" }}>כניסה</button>
        </div>
      </Shell>
    );
  }

  /* ---------- דשבורד הורים ---------- */
  if (screen === "parent") {
    if (!parentOk) { setScreen("home"); return null; }
    return (
      <Shell {...sp}>
        <BackBtn onClick={() => setScreen("home")} isTablet={isTablet} />
        <h2 style={{ fontFamily: "'Rubik', sans-serif", fontSize: isTablet ? 32 : 26, margin: "4px 0 4px", color: "#1f2937", textAlign: "center" }}>אזור הורים — {current}</h2>
        <p style={{ textAlign: "center", color: "#6b7280", fontSize: isTablet ? 17 : 14, margin: "0 0 20px" }}>הרמה עולה אוטומטית עם התרגול. כאן אפשר לכוון ידנית כל נושא.</p>
        <div style={{ maxWidth: 600, margin: "0 auto", display: "flex", flexDirection: "column", gap: 10 }}>
          {courseTopics.map((t) => {
            const pr = getProg(cur, t.id);
            return (
              <div key={t.id} style={{ background: "#fff", borderRadius: 16, boxShadow: "0 4px 12px rgba(2,6,23,0.06)", padding: isTablet ? "14px 18px" : "12px 14px", display: "flex", alignItems: "center", gap: 12 }}>
                <Icon name={topicIcon(t)} size={isTablet ? 30 : 26} color={t.color} stroke={1.8} />
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 800, fontSize: isTablet ? 18 : 16, color: "#1f2937" }}>{t.title}</div>
                  <div style={{ height: 6, borderRadius: 99, background: "#eef2f7", overflow: "hidden", marginTop: 5 }}>
                    <div style={{ height: "100%", width: `${pr.lvl >= maxLvlOf(t) ? 100 : Math.round((pr.xp / NEED) * 100)}%`, background: t.color }} />
                  </div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <button onClick={() => setTopicLevel(t.id, pr.lvl - 1, maxLvlOf(t))} disabled={pr.lvl <= 0}
                    style={{ fontFamily: "inherit", cursor: pr.lvl <= 0 ? "default" : "pointer", border: "none", borderRadius: 10, width: 34, height: 34, fontSize: 22, fontWeight: 800, background: pr.lvl <= 0 ? "#f1f5f9" : "#fff1f0", color: pr.lvl <= 0 ? "#cbd5e1" : "#cf1322", boxShadow: "0 2px 6px rgba(2,6,23,0.06)" }}>−</button>
                  <span style={{ minWidth: 58, textAlign: "center", fontWeight: 800, fontSize: isTablet ? 16 : 14, color: t.color }}>{levelName(pr.lvl)}</span>
                  <button onClick={() => setTopicLevel(t.id, pr.lvl + 1, maxLvlOf(t))} disabled={pr.lvl >= maxLvlOf(t)}
                    style={{ fontFamily: "inherit", cursor: pr.lvl >= maxLvlOf(t) ? "default" : "pointer", border: "none", borderRadius: 10, width: 34, height: 34, fontSize: 22, fontWeight: 800, background: pr.lvl >= maxLvlOf(t) ? "#f1f5f9" : "#f6ffed", color: pr.lvl >= maxLvlOf(t) ? "#cbd5e1" : "#389e0d", boxShadow: "0 2px 6px rgba(2,6,23,0.06)" }}>+</button>
                </div>
              </div>
            );
          })}
        </div>
      </Shell>
    );
  }

  /* ---------- תרגול ---------- */
  const questionCard = (
    <div style={{
      background: "#fff", borderRadius: 28, padding: twoCol ? "34px 26px" : isTablet ? "28px 22px" : "24px 18px",
      boxShadow: "0 12px 30px rgba(2,6,23,0.06)", borderTop: `4px solid ${topic.color}`,
      display: "flex", flexDirection: "column", justifyContent: "center", flex: twoCol ? 1 : undefined, marginBottom: twoCol ? 0 : 16,
    }}>
      <p onClick={() => speak(problemSpeech(problem))} title="לחצי להקראת השאלה"
        style={{ textAlign: "center", color: "#6b7280", fontSize: S.prompt, margin: "0 0 16px", lineHeight: 1.5, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 7 }} dir="rtl">
        <Icon name="speaker" size={isTablet ? 20 : 17} color="#9aa3b2" /><span>{problem.prompt}</span>
      </p>
      <div style={{ minHeight: 56, display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center", gap: 14, fontSize: S.expr, color: "#1f2937" }}>
        {problem.text != null ? (() => {
          const tlen = stripNiqqud(problem.text).length;
          const tfs = tlen > 14 ? (isTablet ? 40 : 30) : tlen > 6 ? (isTablet ? 64 : 48) : (isTablet ? 92 : 72);
          return (
          <button onClick={() => speak(problem.say || problem.text)} title="לחצי לשמיעה"
            style={{ fontFamily: "inherit", cursor: "pointer", border: `2px dashed ${topic.color}55`, background: "#fafafa",
              borderRadius: 18, padding: isTablet ? "14px 28px" : "12px 20px", color: "#1f2937", fontWeight: 800,
              fontSize: tfs, lineHeight: tlen > 6 ? 1.9 : 1.6, wordSpacing: tlen > 6 ? "0.4em" : "normal",
              direction: "rtl", touchAction: "manipulation", WebkitTapHighlightColor: "transparent", maxWidth: "100%" }}>
            <span style={{ display: "inline-flex", alignItems: "center", gap: 12, flexWrap: "wrap", justifyContent: "center" }}>{problem.text} <Icon name="speaker" size={isTablet ? 26 : 22} color={topic.color} /></span>
          </button>
          );
        })() : problem.figure ? <Figure fig={problem.figure} color={topic.color} />
          : problem.vertical ? <Vertical data={problem.vertical} color={topic.color} big={isTablet} />
          : (problem.expr && problem.expr.length > 0) ? <MathLine parts={problem.expr} /> : null}
        {problem.say != null && problem.text == null && (
          <button onClick={() => speak(problem.say)}
            style={{ fontFamily: "inherit", cursor: "pointer", border: "none", background: topic.color, color: "#fff",
              borderRadius: 18, padding: isTablet ? "16px 34px" : "13px 26px", fontWeight: 800, fontSize: isTablet ? 24 : 20,
              boxShadow: "0 6px 16px rgba(2,6,23,0.10)", touchAction: "manipulation", WebkitTapHighlightColor: "transparent",
              display: "inline-flex", alignItems: "center", gap: 10 }}>
            <Icon name="speaker" size={isTablet ? 26 : 22} color="#fff" /><span>{problem.listenLabel || "שמיעה"}</span>
          </button>
        )}
      </div>
      <div style={{ marginTop: 20, display: "flex", justifyContent: "center" }}>
        <div dir="ltr" style={{
          minWidth: isTablet ? 190 : 150, minHeight: isTablet ? 72 : 56, padding: "8px 22px", borderRadius: 18,
          border: `3px solid ${feedback === "ok" ? "#52c41a" : feedback === "no" ? "#ff4d4f" : "#e5e7eb"}`,
          background: "#fafafa", display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: isTablet ? 38 : 30, fontWeight: 800, color: "#1f2937", userSelect: "none",
        }}>
          {input === "" ? <span style={{ color: "#cbd5e1" }}>?</span> : renderInput(input, problem.kind)}
        </div>
      </div>
      {feedback === "ok" && (leveledUp
        ? <p style={{ textAlign: "center", color: "#722ed1", fontWeight: 800, fontSize: isTablet ? 24 : 20, margin: "16px 0 0", display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 8, width: "100%" }}><Icon name="star" size={isTablet ? 26 : 22} color="#f59e0b" stroke={2} /> עלית רמה! עכשיו {level.name}</p>
        : <p style={{ textAlign: "center", color: "#389e0d", fontWeight: 800, fontSize: isTablet ? 24 : 20, margin: "16px 0 0", display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 6, width: "100%" }}>נכון מאוד! +{level.stars} <Icon name="star" size={isTablet ? 22 : 19} color="#f59e0b" stroke={2} /></p>)}
      {feedback === "no" && <p style={{ textAlign: "center", color: "#cf1322", fontWeight: 700, fontSize: isTablet ? 19 : 17, margin: "16px 0 0" }} dir="rtl">לא בדיוק — נסי שוב, או הציצי ברמז 💡</p>}
    </div>
  );

  const padColumn = (
    <div style={{ display: "flex", flexDirection: "column", justifyContent: "center", gap: 18, flex: twoCol ? 1 : undefined }}>
      {feedback !== "ok" && (problem.kind === "choice"
        ? (() => {
          const isReading = topic.id && topic.id.indexOf("rd") === 0;
          const longest = Math.max(...problem.choices.map((c) => stripNiqqud("" + c).length));
          const cfs = isReading ? (longest <= 2 ? (isTablet ? 50 : 40) : longest <= 6 ? (isTablet ? 36 : 30) : (isTablet ? 26 : 22)) : (isTablet ? 22 : 19);
          const ch = isReading ? (longest <= 6 ? (isTablet ? 92 : 76) : (isTablet ? 78 : 64)) : (isTablet ? 70 : 58);
          return (
          <div style={{ display: "grid", gridTemplateColumns: problem.choices.length > 2 ? "repeat(2,1fr)" : "1fr", gap: isTablet ? 14 : 10, width: "100%", maxWidth: 440, margin: "0 auto" }}>
            {problem.choices.map((opt) => (
              <button key={opt} onClick={() => { setInput(opt); if (problem.speakChoices) speak(problem.speakMap ? problem.speakMap[opt] : opt); }}
                style={{ fontFamily: "inherit", cursor: "pointer", border: input === opt ? "3px solid #36cfc9" : "2px solid #e5e7eb",
                  borderRadius: 16, height: ch, fontSize: cfs, fontWeight: 800, lineHeight: 1.5,
                  background: input === opt ? "#e6fffb" : "#fff", color: "#1f2937", boxShadow: "0 4px 12px rgba(2,6,23,0.06)",
                  direction: "rtl", touchAction: "manipulation", WebkitTapHighlightColor: "transparent" }}>{opt}</button>
            ))}
            <button onClick={check} style={{ gridColumn: "1 / -1", fontFamily: "inherit", cursor: "pointer", border: "none",
              borderRadius: 16, height: isTablet ? 64 : 54, fontSize: isTablet ? 24 : 21, fontWeight: 800, background: "#52c41a", color: "#fff",
              boxShadow: "0 6px 16px rgba(2,6,23,0.10)", touchAction: "manipulation" }}>✓ בדיקה</button>
          </div>
          );
        })()
        : problem.kind === "numline"
        ? (
          <div style={{ display: "flex", flexDirection: "column", gap: 16, alignItems: "center", width: "100%" }}>
            <NumberLine max={problem.numMax} value={input} setValue={(v) => setInput(String(v))} color={topic.color} isTablet={isTablet} />
            <button onClick={check} style={{ fontFamily: "inherit", cursor: "pointer", border: "none", width: "100%", maxWidth: 440,
              borderRadius: 16, height: isTablet ? 64 : 54, fontSize: isTablet ? 24 : 21, fontWeight: 800, background: "#52c41a", color: "#fff",
              boxShadow: "0 6px 16px rgba(2,6,23,0.10)", touchAction: "manipulation" }}>✓ בדיקה</button>
          </div>
        )
        : problem.kind === "speak"
        ? <SpeakCheck target={problem.target} color={topic.color} isTablet={isTablet}
            onDone={(ok, hr) => { setInput(hr || (ok ? problem.target : " ")); setFeedback(ok ? "ok" : "no"); applyResult(ok); }} />
        : <NumPad mode={padMode} onKey={handleKey} isTablet={isTablet} landscape={landscape} />)}
      <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
        {feedback === "ok" ? (
          <ActionBtn onClick={() => nextProblem()} bg={topic.color} color="#fff" isTablet={isTablet}>תרגיל הבא ←</ActionBtn>
        ) : (
          <>
            <ActionBtn onClick={() => setShowHint((s) => !s)} bg="#fff7e6" color="#d46b08" isTablet={isTablet}><Icon name="bulb" size={isTablet ? 20 : 18} color="#d46b08" /> רמז</ActionBtn>
            <ActionBtn onClick={() => setShowSol((s) => !s)} bg="#f0f0f0" color="#595959" isTablet={isTablet}><Icon name="book" size={isTablet ? 20 : 18} color="#595959" /> פתרון</ActionBtn>
            <ActionBtn onClick={() => nextProblem()} bg="#fff" color="#8c8c8c" isTablet={isTablet}><Icon name="refresh" size={isTablet ? 20 : 18} color="#8c8c8c" /> תרגיל אחר</ActionBtn>
          </>
        )}
      </div>
      {showHint && feedback !== "ok" && <Note bg="#fffbe6" border="#ffe58f" isTablet={isTablet}><span style={{ display: "inline-flex", alignItems: "flex-start", gap: 8 }}><span style={{ flex: "none", marginTop: 2 }}><Icon name="bulb" size={isTablet ? 19 : 17} color="#d4a017" /></span><span>{problem.hint}</span></span></Note>}
      {showSol && feedback !== "ok" && (
        <div dir="rtl" style={{ background: "#f9f0ff", border: "2px solid #d3adf7", borderRadius: 16, padding: isTablet ? "16px 18px" : "14px 16px" }}>
          <div style={{ fontWeight: 800, color: "#722ed1", marginBottom: 8, fontSize: isTablet ? 17 : 15, display: "flex", alignItems: "center", gap: 7 }}><Icon name="book" size={isTablet ? 18 : 16} color="#722ed1" /> פתרון שלב אחר שלב:</div>
          <StepLines lines={problem.explanation} big={isTablet} />
          <div style={{ marginTop: 10, fontSize: isTablet ? 18 : 16, fontWeight: 800, display: "flex", alignItems: "center", gap: 4 }} dir="ltr"><span>תשובה:</span> {renderMathText(problem.answerText, isTablet ? 0.9 : 0.85)}</div>
        </div>
      )}
    </div>
  );

  return (
    <Shell {...sp}>
      <BackBtn onClick={() => setScreen(adaptive ? "journey" : "level")} isTablet={isTablet} />
      <div style={{ textAlign: "center", marginBottom: 12 }}>
        <span style={{ fontSize: isTablet ? 18 : 15, fontWeight: 700, color: topic.color, display: "inline-flex", alignItems: "center", gap: 6 }}><Icon name={topicIcon(topic)} size={isTablet ? 20 : 17} color={topic.color} /> {topic.title} · {level.badge ? level.badge + " " : ""}{level.name}</span>
      </div>
      <div style={{ display: "flex", flexDirection: twoCol ? "row-reverse" : "column", gap: twoCol ? 24 : 0, alignItems: "stretch" }}>
        {questionCard}
        {padColumn}
      </div>
    </Shell>
  );
}

function renderInput(input, kind) {
  if (kind === "fraction" && input.includes("/")) {
    const [n, d] = input.split("/");
    return <span style={{ display: "inline-flex", alignItems: "center" }}><Frac n={n || "?"} d={d || "?"} /></span>;
  }
  return <span>{input}</span>;
}

/* ---------- דף טיוטה לכתיבה עם עט (S Pen) — דפים נפרדים, בלי גלילה ---------- */
function ScratchPad({ isTablet, open, setOpen }) {
  const [color, setColor] = useState("#1f2937");
  const [erase, setErase] = useState(false);
  const [pageCount, setPageCount] = useState(1);
  const [pageIndex, setPageIndex] = useState(0);
  const canvasRef = useRef(null);
  const ctxRef = useRef(null);
  const drawing = useRef(false);
  const last = useRef(null);
  const pagesRef = useRef([null]); // dataURL לכל דף
  const idxRef = useRef(0);

  const setup = useCallback(() => {
    const canvas = canvasRef.current; if (!canvas) return;
    const rect = canvas.getBoundingClientRect();
    const ratio = window.devicePixelRatio || 1;
    canvas.width = Math.max(1, Math.floor(rect.width * ratio));
    canvas.height = Math.max(1, Math.floor(rect.height * ratio));
    const ctx = canvas.getContext("2d");
    ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    ctx.lineCap = "round"; ctx.lineJoin = "round";
    ctxRef.current = ctx;
  }, []);

  const clearCanvas = () => {
    const c = canvasRef.current, ctx = ctxRef.current; if (!c || !ctx) return;
    ctx.save(); ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.clearRect(0, 0, c.width, c.height); ctx.restore();
  };
  const restore = (idx) => {
    clearCanvas();
    const d = pagesRef.current[idx]; if (!d) return;
    const img = new Image();
    img.onload = () => { const c = canvasRef.current, ctx = ctxRef.current; if (!c || !ctx) return; ctx.save(); ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.drawImage(img, 0, 0, c.width, c.height); ctx.restore(); };
    img.src = d;
  };
  const snapshot = () => { const c = canvasRef.current; if (c) { try { pagesRef.current[idxRef.current] = c.toDataURL(); } catch (_) {} } };

  useEffect(() => {
    if (!open) return;
    const id = requestAnimationFrame(() => { setup(); restore(idxRef.current); });
    const onR = () => { snapshot(); setup(); restore(idxRef.current); };
    window.addEventListener("resize", onR);
    window.addEventListener("orientationchange", onR);
    return () => { cancelAnimationFrame(id); window.removeEventListener("resize", onR); window.removeEventListener("orientationchange", onR); };
  }, [open, setup]);

  const pos = (e) => { const r = canvasRef.current.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; };
  const isPenErase = (e) => (e.buttons & 2) !== 0 || (e.buttons & 32) !== 0;
  const drawSeg = (a, b, e) => {
    const ctx = ctxRef.current; if (!ctx) return;
    const doErase = erase || isPenErase(e);
    ctx.globalCompositeOperation = doErase ? "destination-out" : "source-over";
    ctx.strokeStyle = color;
    const pr = e.pressure && e.pressure > 0 ? e.pressure : 0.5;
    ctx.lineWidth = doErase ? 30 : (e.pointerType === "pen" ? 1.4 + pr * 4.5 : 2.8);
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
  };
  const down = (e) => {
    if (e.pointerType === "touch") return; // אצבע לא מציירת ולא גוללת את הדף
    e.preventDefault();
    drawing.current = true;
    const p = pos(e); last.current = p;
    drawSeg(p, { x: p.x + 0.01, y: p.y + 0.01 }, e);
    try { canvasRef.current.setPointerCapture(e.pointerId); } catch (_) {}
  };
  const move = (e) => {
    if (!drawing.current || e.pointerType === "touch") return;
    e.preventDefault();
    const evs = e.getCoalescedEvents ? e.getCoalescedEvents() : null;
    const list = evs && evs.length ? evs : [e];
    let prev = last.current;
    for (const ev of list) { const p = pos(ev); drawSeg(prev, p, e); prev = p; }
    last.current = prev;
  };
  const up = () => { drawing.current = false; last.current = null; };

  const clearPage = () => { clearCanvas(); pagesRef.current[idxRef.current] = null; };
  const goTo = (ni) => { snapshot(); idxRef.current = ni; setPageIndex(ni); restore(ni); };
  const newPage = () => { snapshot(); pagesRef.current.push(null); const ni = pagesRef.current.length - 1; idxRef.current = ni; setPageCount(pagesRef.current.length); setPageIndex(ni); clearCanvas(); };
  const prevPage = () => { if (idxRef.current > 0) goTo(idxRef.current - 1); };
  const nextPage = () => { if (idxRef.current < pagesRef.current.length - 1) goTo(idxRef.current + 1); };

  const tbtn = { fontFamily: "inherit", cursor: "pointer", border: "none", borderRadius: 10, padding: "5px 11px", fontSize: 13, fontWeight: 800, background: "#f0f0f0", color: "#595959", touchAction: "manipulation" };
  const navbtn = (dis) => ({ ...tbtn, opacity: dis ? 0.4 : 1, padding: "5px 12px" });

  if (!open) {
    return (
      <button onClick={() => setOpen(true)}
        style={{ position: "fixed", bottom: 16, insetInlineStart: 16, zIndex: 60, fontFamily: "inherit", cursor: "pointer",
          border: "none", borderRadius: 16, padding: "12px 18px", fontSize: 16, fontWeight: 800, background: "#36cfc9", color: "#fff",
          boxShadow: "0 5px 14px rgba(0,0,0,0.2)", touchAction: "manipulation", WebkitTapHighlightColor: "transparent",
          display: "inline-flex", alignItems: "center", gap: 8 }}>
        <Icon name="pencil" size={18} color="#fff" /> דף טיוטה
      </button>
    );
  }

  const palette = ["#1f2937", "#0958d9", "#cf1322"];
  const gridBg = "repeating-linear-gradient(#eef2f7 0 1px, transparent 1px 26px), repeating-linear-gradient(90deg, #eef2f7 0 1px, transparent 1px 26px)";
  return (
    <div dir="rtl" style={{ position: "fixed", left: 0, right: 0, bottom: 0, height: "50vh", zIndex: 60, background: "#fff",
      borderTop: "3px solid #36cfc9", boxShadow: "0 -10px 30px rgba(0,0,0,0.15)", display: "flex", flexDirection: "column" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 7, padding: "5px 10px", borderBottom: "1px solid #eee", flexWrap: "wrap" }}>
        <div style={{ display: "flex", gap: 5 }}>
          {palette.map((c) => (
            <button key={c} onClick={() => { setColor(c); setErase(false); }}
              style={{ width: 26, height: 26, borderRadius: "50%", background: c, cursor: "pointer",
                border: (!erase && color === c) ? "3px solid #36cfc9" : "2px solid #ddd", touchAction: "manipulation" }} />
          ))}
        </div>
        <button onClick={() => setErase((e) => !e)} style={{ ...tbtn, background: erase ? "#fff7e6" : "#f0f0f0", color: erase ? "#d46b08" : "#595959" }}><Icon name="eraser" size={20} color={erase ? "#d46b08" : "#595959"} /></button>
        <button onClick={clearPage} style={tbtn}><Icon name="trash" size={20} color="#595959" /></button>
        <span style={{ width: 1, height: 22, background: "#eee" }} />
        <button onClick={prevPage} style={navbtn(pageIndex === 0)}>‹</button>
        <span style={{ fontSize: 13, fontWeight: 800, color: "#595959", minWidth: 56, textAlign: "center" }}>דף {pageIndex + 1}/{pageCount}</span>
        <button onClick={nextPage} style={navbtn(pageIndex === pageCount - 1)}>›</button>
        <button onClick={newPage} style={{ ...tbtn, background: "#e6fffb", color: "#08979c", display: "inline-flex", alignItems: "center", gap: 5 }}><Icon name="plus" size={16} color="#08979c" /> דף</button>
        <button onClick={() => setOpen(false)} style={{ ...tbtn, marginInlineStart: "auto" }}>✕ סגור</button>
      </div>
      <div style={{ flex: 1, position: "relative", backgroundImage: gridBg, overflow: "hidden" }}>
        <canvas ref={canvasRef} onPointerDown={down} onPointerMove={move} onPointerUp={up} onPointerCancel={up}
          style={{ position: "absolute", inset: 0, width: "100%", height: "100%", touchAction: "none", cursor: "crosshair" }} />
      </div>
    </div>
  );
}

/* ---------- מעטפת ועזר ---------- */
function Shell({ children, stars, streak, solved, isTablet, landscape, player, onSwitch }) {
  const [padOpen, setPadOpen] = useState(false);
  const outerPad = isTablet ? (landscape ? "20px 32px 40px" : "18px 22px 40px") : "16px 14px 50px";
  return (
    <div dir="rtl" style={{
      minHeight: "100vh", fontFamily: "'Rubik', system-ui, sans-serif", touchAction: "manipulation", WebkitTextSizeAdjust: "100%",
      background: "radial-gradient(circle at 12% 0%, #e9f4f1 0%, transparent 46%), radial-gradient(circle at 92% 10%, #eaeefb 0%, transparent 46%), linear-gradient(180deg,#fbfdfe,#f2f5fb)",
    }}>
      <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
      <div style={{
        padding: outerPad, boxSizing: "border-box",
        ...(padOpen ? { height: "50vh", overflowY: "auto", WebkitOverflowScrolling: "touch", overscrollBehavior: "contain" } : {}),
      }}>
        <div style={{ maxWidth: isTablet ? (landscape ? 1180 : 760) : 560, margin: "0 auto" }}>
          <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: isTablet ? 14 : 10, marginBottom: 16, flexWrap: "wrap" }}>
            {player && (
              <button onClick={onSwitch} title="החלף שחקן" style={{ fontFamily: "inherit", cursor: "pointer", border: "none", background: "#fff", borderRadius: 16, padding: isTablet ? "9px 16px" : "6px 12px", boxShadow: "0 3px 10px rgba(2,6,23,0.06)", fontSize: isTablet ? 16 : 14, fontWeight: 800, color: "#36cfc9", touchAction: "manipulation", display: "inline-flex", alignItems: "center", gap: 6 }}><Icon name="user" size={isTablet ? 17 : 15} color="#36cfc9" /> {player} <Icon name="swap" size={isTablet ? 16 : 14} color="#36cfc9" /></button>
            )}
            <Stat label="כוכבים" val={stars} icon="star" iconColor="#f59e0b" isTablet={isTablet} />
            <Stat label="רצף" val={streak} icon="flame" iconColor="#ef4444" isTablet={isTablet} />
            <Stat label="נפתרו" val={solved} icon="checkc" iconColor="#22c55e" isTablet={isTablet} />
          </div>
          {children}
        </div>
      </div>
      <ScratchPad isTablet={isTablet} open={padOpen} setOpen={setPadOpen} />
    </div>
  );
}
function Stat({ label, val, icon, iconColor, isTablet }) {
  return (
    <div style={{ background: "#fff", borderRadius: 16, padding: isTablet ? "9px 20px" : "6px 14px", boxShadow: "0 3px 10px rgba(2,6,23,0.06)", textAlign: "center", minWidth: isTablet ? 100 : 78 }}>
      <div style={{ fontSize: isTablet ? 22 : 18, fontWeight: 800, color: "#1f2937", display: "inline-flex", alignItems: "center", gap: 6 }}>
        {icon && <Icon name={icon} size={isTablet ? 20 : 16} color={iconColor} stroke={2} />}{val}
      </div>
      <div style={{ fontSize: isTablet ? 12 : 11, color: "#9ca3af" }}>{label}</div>
    </div>
  );
}
function BackBtn({ onClick, isTablet }) {
  return (
    <button onClick={onClick} style={{
      fontFamily: "inherit", cursor: "pointer", border: "none", background: "transparent",
      color: "#6b7280", fontSize: isTablet ? 18 : 16, fontWeight: 700, marginBottom: 6, padding: 5,
      touchAction: "manipulation", userSelect: "none", WebkitTapHighlightColor: "transparent",
    }}>→ חזרה</button>
  );
}
function ActionBtn({ children, onClick, bg, color, isTablet }) {
  return (
    <button onClick={onClick} style={{
      fontFamily: "inherit", cursor: "pointer", border: "none", borderRadius: 16,
      padding: isTablet ? "14px 22px" : "12px 18px", fontSize: isTablet ? 18 : 16, fontWeight: 800, background: bg, color,
      boxShadow: "0 4px 12px rgba(2,6,23,0.08)", touchAction: "manipulation", userSelect: "none", WebkitTapHighlightColor: "transparent",
      display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 8,
    }}>{children}</button>
  );
}
function Note({ children, bg, border, isTablet }) {
  return (
    <div dir="rtl" style={{ background: bg, border: `2px solid ${border}`, borderRadius: 16, padding: isTablet ? "16px 18px" : "14px 16px", fontSize: isTablet ? 18 : 16, lineHeight: 1.6, color: "#1f2937" }}>{children}</div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));

</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); });
}
</script>
</body>
</html>
