<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useRef } = React;


/* ============================================================
   מעבדת המספרים — גרסה מאוחדת (טלפון + טאבלט, זיהוי אוטומטי)
   · גאומטריה עם ציורים (SVG)
   · דוגמה פתורה מפורטת לפני כל נושא — כל הדרך, שלב בכל שורה
   · פתרונות מפורקים לשלבים (שורה לכל שלב)
   · מקלדת ללא מקלדת מערכת, שברים + משוואות + השוואות (>,<,=)
   ============================================================ */

/* ---------- כלי עזר מתמטיים ---------- */
const ri = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
const shuffle = (a) => a.slice().sort(() => Math.random() - 0.5);
/* הקראה בעברית (Web Speech) — להשמעת אותיות, הברות, מילים ומשפטים */
let heVoice = null;
function pickHeVoice() {
  try { const vs = window.speechSynthesis ? window.speechSynthesis.getVoices() : []; heVoice = vs.find((v) => /he|iw/i.test(v.lang)) || heVoice; } catch (_) {}
}
if (typeof window !== "undefined" && window.speechSynthesis) {
  pickHeVoice();
  window.speechSynthesis.onvoiceschanged = pickHeVoice;
}
function speak(text, rate) {
  try {
    const synth = window.speechSynthesis;
    if (!synth || !text) return;
    synth.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "he-IL";
    u.rate = rate || 0.8;
    if (!heVoice) pickHeVoice();
    if (heVoice) u.voice = heVoice;
    synth.speak(u);
  } catch (_) {}
}
/* ממיר ביטוי מתמטי לאמירה בעברית, להקראת השאלה כולה */
function exprToSpeech(parts) {
  if (!parts || !parts.length) return "";
  return parts.map((p) => (p.t === "frac" ? `${p.n} חלקי ${p.d}` : p.v)).join(" ")
    .replace(/×/g, " כפול ").replace(/\+/g, " ועוד ").replace(/[−-]/g, " פחות ")
    .replace(/=/g, " שווה ").replace(/</g, " קטן מ ").replace(/>/g, " גדול מ ")
    .replace(/[?▢_]/g, " ").replace(/\s+/g, " ").trim();
}
/* טקסט מלא להקראת שאלה: הוראה + הביטוי/מילה */
function problemSpeech(p) {
  if (!p) return "";
  if (p.say != null) return [p.prompt, p.say].filter(Boolean).join(". ");
  return [p.prompt, p.text || exprToSpeech(p.expr)].filter(Boolean).join(". ");
}
function gcd(a, b) { a = Math.abs(a); b = Math.abs(b); while (b) { [a, b] = [b, a % b]; } return a || 1; }
function simplify(n, d) { if (d < 0) { n = -n; d = -d; } const g = gcd(n, d) || 1; return [n / g, d / g]; }
function parseFrac(str) {
  if (str == null) return null;
  str = ("" + str).trim().replace(/\s/g, "");
  if (str === "" || str === "-" || str === "/") return null;
  if (str.includes("/")) {
    const parts = str.split("/"); if (parts.length !== 2) return null;
    const n = Number(parts[0]); const d = Number(parts[1]);
    if (!Number.isInteger(n) || !Number.isInteger(d) || d === 0) return null;
    return [n, d];
  }
  const num = Number(str); if (!Number.isInteger(num)) return null; return [num, 1];
}
function fracEqual(input, an, ad) {
  const p = parseFrac(input); if (!p) return false;
  const [n, d] = simplify(p[0], p[1]); const [a, b] = simplify(an, ad);
  return n === a && d === b;
}
function intEqual(input, val) { const s = ("" + input).trim(); if (!/^-?\d+$/.test(s)) return false; return Number(s) === val; }
const fracText = (n, d) => (d === 1 ? `${n}` : `${n}/${d}`);
const coef = (k) => (k === 1 ? "x" : `${k}x`); // 1x → x

/* ---------- שבר עם קו אופקי ---------- */
function Frac({ n, d, color = "currentColor", size = 1 }) {
  return (
    <span style={{ display: "inline-flex", flexDirection: "column", alignItems: "center", verticalAlign: "middle", margin: "0 6px", lineHeight: 1, color }}>
      <span style={{ fontSize: `${0.92 * size}em`, fontWeight: 800, padding: "0 5px" }}>{n}</span>
      <span style={{ width: "100%", height: 3.5, background: color, borderRadius: 3, margin: "3.5px 0" }} />
      <span style={{ fontSize: `${0.92 * size}em`, fontWeight: 800, padding: "0 5px" }}>{d}</span>
    </span>
  );
}
function MathLine({ parts }) {
  if (!parts || parts.length === 0) return null;
  return (
    <span dir="ltr" style={{ display: "inline-flex", alignItems: "center", flexWrap: "wrap", justifyContent: "center", gap: 5 }}>
      {parts.map((p, i) => (p.t === "frac"
        ? <Frac key={i} n={p.n} d={p.d} size={1.05} />
        : <span key={i} style={{ fontWeight: p.t === "op" ? 700 : 800, margin: p.t === "op" ? "0 8px" : 0 }}>{p.v}</span>))}
    </span>
  );
}

/* ---------- שורות פתרון: שלב בכל שורה, עם שברים בקו אופקי ---------- */
const hasHebrew = (s) => /[\u0590-\u05FF]/.test("" + s);
/* ממיר כל תבנית של מספר/מספר בטקסט לשבר עם קו אופקי */
function renderMathText(str, size = 0.82) {
  const parts = ("" + str).split(/(\d+\/\d+)/g);
  return parts.map((seg, i) => {
    const m = seg.match(/^(\d+)\/(\d+)$/);
    if (m) return <Frac key={i} n={m[1]} d={m[2]} size={size} />;
    return <span key={i}>{seg}</span>;
  });
}
function StepLines({ lines, big }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 7, marginTop: 4 }}>
      {lines.map((ln, i) => (
        <div key={i} dir={hasHebrew(ln) ? "rtl" : "ltr"}
          style={{ display: "flex", alignItems: "center", flexWrap: "wrap", gap: 2, fontSize: big ? 18 : 16, fontWeight: i === lines.length - 1 ? 800 : 600, color: i === lines.length - 1 ? "#1f2937" : "#4b5563", lineHeight: 1.5 }}>
          {renderMathText(ln, big ? 0.88 : 0.82)}
        </div>
      ))}
    </div>
  );
}

/* ---------- תרגיל במאונך (טורים): חיבור / כפל ---------- */
function Vertical({ data, color, big }) {
  const fs = big ? 42 : 34;
  return (
    <div style={{ display: "inline-flex", flexDirection: "column", alignItems: "stretch", fontFamily: "'Varela Round', monospace", fontWeight: 800, direction: "ltr", color: "#1f2937", minWidth: big ? 150 : 120 }}>
      {data.rows.map((r, i) => (
        <div key={i} style={{ display: "flex", justifyContent: "flex-end", gap: 16, fontSize: fs, padding: "2px 12px", letterSpacing: 3 }}>
          {i === data.rows.length - 1 && <span style={{ marginRight: "auto", color }}>{data.op}</span>}
          <span>{r}</span>
        </div>
      ))}
      <div style={{ borderTop: `3px solid ${color}`, marginTop: 6 }} />
    </div>
  );
}

/* ---------- ציורים גאומטריים (SVG) ---------- */
function Figure({ fig, color }) {
  if (fig.type === "rect") {
    const { w, h } = fig;
    const long = Math.max(w, h);
    const scale = 150 / long;
    const W = Math.max(46, Math.round(w * scale));
    const H = Math.max(46, Math.round(h * scale));
    const pad = 40;
    const vw = W + pad * 2, vh = H + pad * 2;

      <svg width={vw} height={vh} viewBox={`0 0 ${vw} ${vh}`} style={{ maxWidth: "100%" }}>
        <rect x={pad} y={pad} width={W} height={H} fill={`${color}22`} stroke={color} strokeWidth="3" rx="5" />
        <text x={pad + W / 2} y={pad + H + 26} textAnchor="middle" fontSize="18" fontWeight="800" fill="#1f2937">{w} ס״מ</text>
        <text x={pad - 12} y={pad + H / 2} textAnchor="middle" fontSize="18" fontWeight="800" fill="#1f2937"
          transform={`rotate(-90 ${pad - 12} ${pad + H / 2})`}>{h} ס״מ</text>
      </svg>
    );
  }
  if (fig.type === "triangle") {

    const A = [26, 140], B = [214, 140], C = [150, 24];

      <svg width="240" height="168" viewBox="0 0 240 168" style={{ maxWidth: "100%" }}>
        <polygon points={`${A[0]},${A[1]} ${B[0]},${B[1]} ${C[0]},${C[1]}`} fill={`${color}22`} stroke={color} strokeWidth="3" strokeLinejoin="round" />
        <text x={A[0] + 26} y={A[1] - 12} textAnchor="middle" fontSize="17" fontWeight="800" fill="#1f2937">{a1}°</text>
        <text x={B[0] - 30} y={B[1] - 12} textAnchor="middle" fontSize="17" fontWeight="800" fill="#1f2937">{a2}°</text>
        <text x={C[0]} y={C[1] + 34} textAnchor="middle" fontSize="22" fontWeight="800" fill="#cf1322">?</text>
      </svg>
    );
  }
  if (fig.type === "shape") {
    const cx = 110, cy = 86, r = 62;
    const poly = (n, rot) => {

    else if (fig.name === "ריבוע") el = <rect x={cx - 56} y={cy - 56} width={112} height={112} rx="4" fill={`${color}22`} stroke={color} strokeWidth="3" />;
    else if (fig.name === "מלבן") el = <rect x={cx - 72} y={cy - 44} width={144} height={88} rx="4" fill={`${color}22`} stroke={color} strokeWidth="3" />;
    else if (fig.name === "מחומש") el = <polygon points={poly(5, -Math.PI / 2)} fill={`${color}22`} stroke={color} strokeWidth="3" strokeLinejoin="round" />;
    else if (fig.name === "משושה") el = <polygon points={poly(6, -Math.PI / 2)} fill={`${color}22`} stroke={color} strokeWidth="3" strokeLinejoin="round" />;

  }
  if (fig.type === "clock") {

    const at = (deg, len) => [cx + len * Math.cos((deg - 90) * Math.PI / 180), cy + len * Math.sin((deg - 90) * Math.PI / 180)];
    const hEnd = at(((h % 12) + m / 60) * 30, R * 0.5);

        <text x={cx + R - 15} y={cy + 6} textAnchor="middle" fontSize="17" fontWeight="800" fill="#1f2937">3</text>

        <line x1={cx} y1={cy} x2={hEnd[0]} y2={hEnd[1]} stroke="#1f2937" strokeWidth="5" strokeLinecap="round" />
        <line x1={cx} y1={cy} x2={mEnd[0]} y2={mEnd[1]} stroke={color} strokeWidth="3.5" strokeLinecap="round" />
        <circle cx={cx} cy={cy} r="4.5" fill="#1f2937" />
      </svg>
    );
  }
  if (fig.type === "angle") {
    const deg = fig.deg;
    const V = [40, 134], L = 150;
    const rad = (deg * Math.PI) / 180;
    const e1 = [V[0] + L, V[1]];
    const e2 = [V[0] + L * Math.cos(rad), V[1] - L * Math.sin(rad)];
    return (
      <svg width="220" height="168" viewBox="0 0 220 168" style={{ maxWidth: "100%" }}>
        <line x1={V[0]} y1={V[1]} x2={e1[0]} y2={e1[1]} stroke={color} strokeWidth="4" strokeLinecap="round" />
        <line x1={V[0]} y1={V[1]} x2={e2[0]} y2={e2[1]} stroke={color} strokeWidth="4" strokeLinecap="round" />
        {deg === 90 && <rect x={V[0]} y={V[1] - 20} width={20} height={20} fill="none" stroke={color} strokeWidth="2.5" />}
        <circle cx={V[0]} cy={V[1]} r="4" fill={color} />
      </svg>
    );
  }
  return null;
}

/* ----- חשבון: חישוב + השוואות ----- */

/* ----- שברים: חיבור / חיסור / כפל / השוואה ----- */
function genFraction(level) {
  const denoms = level === 0 ? [2, 3, 4, 5, 6] : level === 1 ? [3, 4, 5, 6, 8, 10] : [4, 6, 8, 9, 12];

  const makeFrac = () => { const d = pick(denoms); return [ri(1, d - 1), d]; };

  if (mode === "add" || mode === "sub") {
    let [n1, d1] = makeFrac(); let [n2, d2] = makeFrac();
    if (mode === "sub" && n1 / d1 < n2 / d2) { [n1, d1, n2, d2] = [n2, d2, n1, d1]; }
    const num = mode === "add" ? n1 * d2 + n2 * d1 : n1 * d2 - n2 * d1; const den = d1 * d2;
    const [sn, sd] = simplify(num, den); const opSym = mode === "add" ? "+" : "−";
    const lcm = (d1 * d2) / gcd(d1, d2);
    const steps = ["מביאים למכנה משותף", `מכנה משותף: ${den}`, `${n1 * d2}/${den} ${opSym} ${n2 * d1}/${den}`, `= ${num}/${den}`];

    return { kind: "fraction", expr: [{ t: "frac", n: n1, d: d1 }, { t: "op", v: opSym }, { t: "frac", n: n2, d: d2 }, { t: "op", v: "=" }],

  }
  if (mode === "mul") {

    const steps = ["מונה כפול מונה, מכנה כפול מכנה", `${n1} × ${n2} = ${n1 * n2}`, `${d1} × ${d2} = ${d1 * d2}`, `= ${n1 * n2}/${d1 * d2}`];

  const left = n1 * d2, right = n2 * d1; const ans = left > right ? ">" : left < right ? "<" : "=";
  return { kind: "compare", expr: [{ t: "frac", n: n1, d: d1 }, { t: "op", v: "?" }, { t: "frac", n: n2, d: d2 }],
    prompt: "איזה סימן מתאים בין השברים? בחרי >, < או =:", check: (x) => ("" + x).trim() === ans, answerText: ans,
    hint: "הביאו למכנה משותף והשוו את המונים.",

}

/* ---------- חזקות וגורמים ראשוניים ---------- */
const SUP = { "0": "⁰", "1": "¹", "2": "²", "3": "³", "4": "⁴", "5": "⁵", "6": "⁶", "7": "⁷", "8": "⁸", "9": "⁹" };
const sup = (n) => ("" + n).split("").map((d) => SUP[d] || d).join("");
function isPrimeN(n) { if (n < 2) return false; for (let i = 2; i * i <= n; i++) if (n % i === 0) return false; return true; }
function factorize(n) { const f = []; let m = n; for (let p = 2; p <= m; p++) { while (m % p === 0) { f.push(p); m /= p; } } return f; }
function smallestPrime(n) { for (let p = 2; p <= n; p++) if (n % p === 0) return p; return n; }
/* גיוון: שומרים את המספר האחרון כדי לא לחזור עליו פעמיים ברצף */
let primeLast = -1;
const setLast = (n) => { primeLast = n; return n; };
/* מספר פריק אקראי בטווח [min,max] — אחיד על כל הפריקים, לגיוון רחב.
   pred — תנאי נוסף (למשל "קשה יותר"). */
function randComposite(min, max, pred) {
  if (min < 4) min = 4;
  for (let t = 0; t < 800; t++) {
    const n = ri(min, max);
    if (n === primeLast || isPrimeN(n) || (pred && !pred(n))) continue;
    return setLast(n);
  }
  for (let n = min; n <= max; n++) if (n !== primeLast && !isPrimeN(n) && (!pred || pred(n))) return setLast(n);
  return setLast(min % 2 === 0 ? min : min + 1);
}
/* מספר שלם אקראי בטווח, עם הימנעות מחזרה על האחרון */
function randInt(min, max) {
  for (let t = 0; t < 60; t++) { const n = ri(min, max); if (n !== primeLast) return setLast(n); }
  return setLast(ri(min, max));
}

function parseFactors(str) {

  const parts = str.split(/[×x*]/);
  const nums = [];
  for (const p of parts) { if (!/^\d+$/.test(p)) return null; nums.push(Number(p)); }
  return nums;
}
function genPrime(level) {

  const n = randComposite(hard ? 24 : 10, hard ? 100 : 99, pred);

  if (mode === "smallest") {

      check: (x) => intEqual(x, spf), answerText: `${spf}`,
      hint: "בדקי לפי הסדר: מתחלק ב-2? ב-3? ב-5? ב-7?…",
      explanation: [`${n} = ${cf.join(" × ")}`, `הגורם הראשוני הקטן ביותר הוא ${spf}`] };
  }
  if (mode === "largest") {

      check: (x) => intEqual(x, lpf), answerText: `${lpf}`,

  const correct = cf.join(" × ");

    prompt: "כתבי את הפירוק לגורמים ראשוניים (השתמשי בכפתור ×):",

    explanation: ["מפרקים עד שכל הגורמים ראשוניים", `${n} = ${correct}`] };

const PA_WORDS = [
  { w: "דָּג", init: "ד", syl: 1, rhyme: "ag" }, { w: "גַּל", init: "ג", syl: 1, rhyme: "al" },

  { w: "לֶחֶם", init: "ל", syl: 2, rhyme: "echem" }, { w: "סֵפֶר", init: "ס", syl: 2, rhyme: "efer" },
  { w: "שֶׁמֶשׁ", init: "ש", syl: 2, rhyme: "emesh" }, { w: "פֶּרַח", init: "פ", syl: 2, rhyme: "erach" },
  { w: "תַּפּוּחַ", init: "ת", syl: 3, rhyme: "uach" }, { w: "שֻׁלְחָן", init: "ש", syl: 2, rhyme: "an" },
];
const INIT_PHON = { "א": "-", "ע": "-", "ה": "h", "ח": "x", "כ": "k", "ק": "k", "ת": "t", "ט": "t", "ס": "s", "צ": "ts", "ש": "sh", "ב": "b", "פ": "p", "ד": "d", "ג": "g", "ז": "z", "מ": "m", "נ": "n", "ל": "l", "ר": "r", "י": "y", "ו": "v" };
const iph = (c) => INIT_PHON[c] || c;
function paGroups(keyFn, min) {
  const g = {}; PA_WORDS.forEach((w) => { const k = keyFn(w); (g[k] = g[k] || []).push(w); });
  return { g, rich: Object.keys(g).filter((k) => g[k].length >= (min || 2)) };
}
function genPhonics(level) {
  const mode = pick(level === 0 ? ["syl", "rhyme", "init"] : ["syl", "rhyme", "init", "init"]);
  if (mode === "syl") {
    const word = pick(PA_WORDS);
    return { kind: "choice", expr: [], say: word.w, listenLabel: "🔊 הַקְשִׁיבִי לַמִּלָּה", choices: ["1", "2", "3"],
      prompt: "כַּמָּה הֲבָרוֹת יֵשׁ בַּמִּלָּה? (לַחֲצִי עַל הָרַמְקוֹל)", check: (x) => x === String(word.syl), answerText: String(word.syl),
      hint: "מוֹחֲאִים כַּף לְכָל הֲבָרָה — וְסוֹפְרִים.", explanation: [`${word.w} — ${word.syl} הֲבָרוֹת`] };
  }
  if (mode === "rhyme") {
    const { g, rich } = paGroups((w) => w.rhyme);
    const key = pick(rich); const grp = g[key];
    const target = pick(grp); const match = pick(grp.filter((w) => w.w !== target.w));
    const distract = shuffle(PA_WORDS.filter((w) => w.rhyme !== key)).slice(0, 2);
    const choices = shuffle([match.w, ...distract.map((d) => d.w)]);
    const speakMap = {}; [match, ...distract].forEach((d) => { speakMap[d.w] = d.w; });
    return { kind: "choice", text: target.w, say: target.w, choices, speakChoices: true, speakMap,
      prompt: `אֵיזוֹ מִלָּה מִתְחָרֶזֶת עִם «${target.w}»?`, check: (x) => x === match.w, answerText: match.w,
      hint: "מִלִּים מִתְחָרְזוֹת נִשְׁמָעוֹת דּוֹמֶה בַּסּוֹף.", explanation: [`«${target.w}» וְ-«${match.w}» נִגְמָרוֹת בְּאוֹתוֹ צְלִיל`] };
  }
  // init — צליל פותח
  const { g, rich } = paGroups((w) => w.init);
  const key = pick(rich); const grp = g[key];
  const target = pick(grp); const match = pick(grp.filter((w) => w.w !== target.w));
  const distract = shuffle(PA_WORDS.filter((w) => iph(w.init) !== iph(key))).slice(0, 2);
  const choices = shuffle([match.w, ...distract.map((d) => d.w)]);
  const speakMap = {}; [match, ...distract].forEach((d) => { speakMap[d.w] = d.w; });
  return { kind: "choice", text: target.w, say: target.w, choices, speakChoices: true, speakMap,
    prompt: `אֵיזוֹ מִלָּה מַתְחִילָה בְּאוֹתוֹ צְלִיל כְּמוֹ «${target.w}»?`, check: (x) => x === match.w, answerText: match.w,
    hint: "הַקְשִׁיבִי לַצְּלִיל הָרִאשׁוֹן שֶׁל כָּל מִלָּה.", explanation: [`«${target.w}» וְ-«${match.w}» מַתְחִילוֹת בְּאוֹתוֹ צְלִיל`] };
}

/* ---------- זיהוי מכשיר ---------- */
function useDevice() {
  const calc = () => {
    if (typeof window === "undefined") return { isTablet: true, landscape: true };
    const w = window.innerWidth, h = window.innerHeight;
    return { isTablet: Math.min(w, h) >= 600, landscape: w > h };
  };
  const [d, setD] = useState(calc);
  useEffect(() => {
    const on = () => setD(calc());
    window.addEventListener("resize", on);
    window.addEventListener("orientationchange", on);
    return () => { window.removeEventListener("resize", on); window.removeEventListener("orientationchange", on); };
  }, []);
  return d;
}

/* ---------- קו מספרים נגרר (המחשה מוחשית: גרירה עדיפה על הקשה) ---------- */
function NumberLine({ max, value, setValue, color, isTablet }) {
  const ref = useRef(null);
  const drag = useRef(false);
  const W = isTablet ? 560 : 330, H = 96, padX = 26, baseY = 60;
  const innerW = W - padX * 2;
  const labelStep = max <= 20 ? (max <= 10 ? 1 : 2) : 5;
  const toX = (v) => padX + (v / max) * innerW;
  const fromEvt = (e) => {
    const r = ref.current.getBoundingClientRect();
    const xv = (e.clientX - r.left) / r.width * W;
    return Math.max(0, Math.min(max, Math.round(((xv - padX) / innerW) * max)));
  };
  const set = (e) => { e.preventDefault(); setValue(fromEvt(e)); };
  const ticks = [];
  for (let v = 0; v <= max; v++) {
    const x = toX(v); const major = v % labelStep === 0;
    ticks.push(<line key={"t" + v} x1={x} y1={baseY - (major ? 9 : 5)} x2={x} y2={baseY + (major ? 9 : 5)} stroke="#cbd5e1" strokeWidth={major ? 2 : 1} />);
    if (major) ticks.push(<text key={"n" + v} x={x} y={baseY + 27} textAnchor="middle" fontSize="13" fontWeight="700" fill="#64748b">{v}</text>);
  }
  const has = value != null && value !== "";
  const mx = toX(has ? Number(value) : 0);
  return (
    <svg ref={ref} width="100%" viewBox={`0 0 ${W} ${H}`} style={{ touchAction: "none", cursor: "pointer", maxWidth: W, userSelect: "none" }}
      onPointerDown={(e) => { drag.current = true; try { e.currentTarget.setPointerCapture(e.pointerId); } catch (_) {} set(e); }}
      onPointerMove={(e) => { if (drag.current) set(e); }}
      onPointerUp={() => { drag.current = false; }} onPointerCancel={() => { drag.current = false; }}>
      <line x1={padX} y1={baseY} x2={W - padX} y2={baseY} stroke="#94a3b8" strokeWidth="3" strokeLinecap="round" />
      {ticks}
      {has && (
        <g>
          <line x1={mx} y1={baseY} x2={mx} y2={26} stroke={color} strokeWidth="3" />
          <rect x={mx - 20} y={4} width="40" height="24" rx="7" fill={color} />
          <text x={mx} y={21} textAnchor="middle" fontSize="16" fontWeight="800" fill="#fff">{value}</text>
          <circle cx={mx} cy={baseY} r="12" fill={color} stroke="#fff" strokeWidth="3" />
        </g>
      )}
    </svg>
  );
}

          <input value={name} onChange={(e) => setName(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") add(); }} placeholder="שם חדש…" maxLength={12}
            style={{ flex: 1, fontFamily: "inherit", fontSize: 18, padding: "12px 14px", borderRadius: 14, border: "2px solid #e5e7eb", outline: "none", textAlign: "right" }} />
          <button onClick={add} style={{ fontFamily: "inherit", cursor: "pointer", border: "none", borderRadius: 14, padding: "12px 20px", fontSize: 18, fontWeight: 800, background: "#36cfc9", color: "#fff", touchAction: "manipulation" }}>➕ הוסף</button>
        </div>
      </div>
    </div>
  );
}

function WorkbookSelect({ courses, onPick, onBack }) {
  return (
    <div dir="rtl" style={{ minHeight: "100vh", fontFamily: "'Varela Round', system-ui, sans-serif",
      background: "radial-gradient(circle at 18% 8%, #fef3c7 0%, transparent 38%), radial-gradient(circle at 88% 26%, #dbeafe 0%, transparent 42%), linear-gradient(180deg,#f8fafc,#eef2ff)",
      display: "flex", alignItems: "center", justifyContent: "center", padding: "24px 16px", boxSizing: "border-box" }}>
      <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Varela+Round&display=swap" rel="stylesheet" />
      <div style={{ width: "100%", maxWidth: 520, textAlign: "center" }}>
        <button onClick={onBack} style={{ fontFamily: "inherit", cursor: "pointer", border: "none", background: "transparent", color: "#6b7280", fontSize: 16, fontWeight: 700, marginBottom: 8 }}>→ החלף שחקן</button>
        <div style={{ fontSize: 52 }}>📚</div>
        <h1 style={{ fontFamily: "'Fredoka', sans-serif", fontSize: 32, margin: "4px 0 18px", color: "#1f2937" }}>בחרו חוברת</h1>
        <div style={{ display: "grid", gap: 14 }}>
          {courses.map((c) => (
            <button key={c.id} onClick={() => onPick(c.id)}
              style={{ fontFamily: "inherit", cursor: "pointer", border: "none", borderRadius: 22, padding: "24px 18px", background: "#fff",
                boxShadow: "0 7px 0 rgba(0,0,0,0.08)", borderTop: `7px solid ${c.color}`, touchAction: "manipulation" }}>
              <div style={{ fontSize: 46 }}>{c.emoji}</div>
              <div style={{ fontSize: 23, fontWeight: 800, color: "#1f2937", marginTop: 6 }}>{c.title}</div>
              <div style={{ fontSize: 14, color: "#9ca3af", marginTop: 2 }}>{c.subtitle}</div>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   אפליקציה
   ============================================================ */
function App() {
  const { isTablet, landscape } = useDevice();
  const twoCol = isTablet && landscape;

  const [screen, setScreen] = useState("home");
  const [topic, setTopic] = useState(null);
  const [level, setLevel] = useState(null);
  const [problem, setProblem] = useState(null);
  const [input, setInput] = useState("");
  const [feedback, setFeedback] = useState(null);
  const [showHint, setShowHint] = useState(false);
  const [showSol, setShowSol] = useState(false);
  const [players, setPlayers] = useState({});
  const [current, setCurrent] = useState(null);
  const [course, setCourse] = useState(null);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    const data = readStore();
    if (data && data.players) {
      setPlayers(data.players);
      setCurrent(data.current && data.players[data.current] ? data.current : null);
    }
    setLoaded(true);
  }, []);

  const cur = (current && players[current]) || blankP();
  const stars = cur.stars, streak = cur.streak, solved = cur.solved;

  function persist(np, cu) { writeStore({ players: np, current: cu }); }
  function pickPlayer(n) { setCurrent(n); persist(players, n); }
  function addPlayer(n) {
    const np = players[n] ? players : { ...players, [n]: blankP() };
    setPlayers(np); setCurrent(n); persist(np, n);
  }
  function switchPlayer() { setScreen("home"); setProblem(null); setCourse(null); setCurrent(null); persist(players, null); }
  function applyResult(ok) {
    setPlayers((prev) => {
      const c = prev[current] || blankP();
      const nx = ok ? { stars: c.stars + level.stars, streak: c.streak + 1, solved: c.solved + 1 } : { ...c, streak: 0 };
      const np = { ...prev, [current]: nx };
      persist(np, current);
      return np;
    });
  }

  const newProblem = useCallback((t, l) => {
    setProblem(genFresh(t, l.id)); setInput(""); setFeedback(null); setShowHint(false); setShowSol(false);
  }, []);
  function startLevel(t, l) {
    setTopic(t); setLevel(l); setScreen("play");
    setProblem(genFresh(t, l.id)); setInput(""); setFeedback(null); setShowHint(false); setShowSol(false);
  }
  function handleKey(k) {
    if (k === "submit") return check();
    if (feedback === "ok") return;
    if (k === "clear") return setInput("");
    if (k === "back") return setInput((s) => s.slice(0, -1));
    if (problem.kind === "compare") return setInput(k);
    const cap = problem.kind === "factors" ? 24 : 7;
    setInput((s) => (s.length < cap ? s + k : s));
  }
  function check() {
    if (!problem || input.trim() === "") return;
    const ok = problem.check(input);
    setFeedback(ok ? "ok" : "no");
    applyResult(ok);
  }
  const padMode = problem ? problem.kind : "number";

  const S = {
    homeTitle: isTablet ? (landscape ? 54 : 46) : 38,
    homeCols: twoCol ? "repeat(5,1fr)" : isTablet ? "repeat(3,1fr)" : "repeat(2,1fr)",
    levelCols: isTablet ? "repeat(3,1fr)" : "1fr",
    expr: twoCol ? 50 : isTablet ? 44 : 34,
    prompt: isTablet ? 20 : 16,
    emoji: isTablet ? 54 : 40,
    topicTitle: isTablet ? 22 : 19,
  };
  const sp = { stars, streak, solved, isTablet, landscape, player: current, onSwitch: switchPlayer };

  if (!loaded) return null;
  if (!current) return <PlayerSelect players={players} onPick={pickPlayer} onAdd={addPlayer} />;
  if (!course) return <WorkbookSelect courses={COURSES} onPick={setCourse} onBack={switchPlayer} />;
  const courseObj = COURSES.find((c) => c.id === course) || COURSES[0];
  const courseTopics = courseObj.topics;
  const backToCourses = () => { setScreen("home"); setProblem(null); setCourse(null); };

  /* ---------- בית ---------- */
  if (screen === "home") {
    return (
      <Shell {...sp}>
        <BackBtn onClick={backToCourses} isTablet={isTablet} />
        <h1 style={{ fontFamily: "'Fredoka', sans-serif", fontSize: S.homeTitle, margin: "4px 0 4px", color: "#1f2937", textAlign: "center" }}>{courseObj.emoji} {courseObj.title}</h1>
        <p style={{ textAlign: "center", color: "#6b7280", margin: "0 0 26px", fontSize: isTablet ? 21 : 17 }}>בחרי נושא, ואז רמת אתגר. בהצלחה!</p>
        <div style={{ display: "grid", gridTemplateColumns: S.homeCols, gap: isTablet ? 18 : 14 }}>
          {courseTopics.map((t) => (
            <button key={t.id} onClick={() => { setTopic(t); setScreen("level"); }}
              style={{
                fontFamily: "inherit", cursor: "pointer", border: "none", borderRadius: 24,
                padding: isTablet ? "30px 14px" : "22px 12px", background: "#fff", boxShadow: "0 7px 0 rgba(0,0,0,0.08)",
                borderTop: `7px solid ${t.color}`, textAlign: "center",

              <div style={{ fontSize: S.topicTitle, fontWeight: 800, marginTop: 8, color: "#1f2937" }}>{t.title}</div>
            </button>

      </Shell>

  /* ---------- בחירת רמה + דוגמה פתורה ---------- */
  if (screen === "level") {
    const ex = topic.example;
    return (
      <Shell {...sp}>
        <BackBtn onClick={() => setScreen("home")} isTablet={isTablet} />
        <div style={{ textAlign: "center", marginBottom: 18 }}>
          <div style={{ fontSize: isTablet ? 60 : 46 }}>{topic.emoji}</div>
          <h2 style={{ fontFamily: "'Fredoka', sans-serif", fontSize: isTablet ? 38 : 30, margin: "4px 0", color: topic.color }}>{topic.title}</h2>
          <p style={{ color: "#6b7280", fontSize: isTablet ? 19 : 16, maxWidth: 620, margin: "8px auto 0", lineHeight: 1.6 }}>{topic.lesson}</p>
        </div>

        {/* כרטיס דוגמה פתורה — כל הדרך, שלב בכל שורה */}
        <div style={{
          maxWidth: 600, margin: "0 auto 22px", background: "#fff", borderRadius: 22,
          border: `2px dashed ${topic.color}`, padding: isTablet ? "22px 26px" : "18px 18px",
        }}>
          <div style={{ fontSize: isTablet ? 17 : 15, fontWeight: 800, color: topic.color, marginBottom: 12, textAlign: "center" }}>✏️ דוגמה פתורה — שלב אחר שלב</div>
          {ex.figure && <div style={{ display: "flex", justifyContent: "center", marginBottom: 12 }}><Figure fig={ex.figure} color={topic.color} /></div>}
          {ex.expr && ex.expr.length > 0 && (
            <div dir="ltr" style={{ fontSize: isTablet ? 30 : 26, fontWeight: 800, color: "#1f2937", display: "flex", justifyContent: "center", marginBottom: 14 }}>
              <MathLine parts={ex.expr} />

          )}
          <div style={{ background: "#fafafa", borderRadius: 14, padding: isTablet ? "16px 20px" : "13px 16px" }}>
            <StepLines lines={ex.steps} big={isTablet} />
          </div>
          <div style={{ textAlign: "center", marginTop: 14 }}>
            <span style={{ background: "#f6ffed", color: "#389e0d", borderRadius: 12, padding: "6px 18px", fontSize: isTablet ? 20 : 18, fontWeight: 800, display: "inline-flex", alignItems: "center", gap: 4 }} dir="ltr">
              <span>תשובה:</span> {renderMathText(ex.answer, isTablet ? 0.9 : 0.85)}
            </span>
          </div>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: S.levelCols, gap: 16, maxWidth: 720, margin: "0 auto" }}>
          {LEVELS.map((l) => (
            <button key={l.id} onClick={() => startLevel(topic, l)}
              style={{
                fontFamily: "inherit", cursor: "pointer", border: "none", borderRadius: 20,
                padding: isTablet ? "24px 20px" : "18px 20px", background: "#fff", boxShadow: "0 5px 0 rgba(0,0,0,0.08)",
                display: "flex", alignItems: "center", justifyContent: "space-between",
                touchAction: "manipulation", userSelect: "none", WebkitTapHighlightColor: "transparent",
              }}>
              <span style={{ fontSize: isTablet ? 25 : 22, fontWeight: 800, color: "#1f2937" }}>{l.badge} {l.name}</span>
              <span style={{ fontSize: isTablet ? 17 : 15, color: "#9ca3af" }}>{"⭐".repeat(l.stars)}</span>
            </button>
          ))}
        </div>
      </Shell>
    );
  }

  /* ---------- תרגול ---------- */
  const questionCard = (
    <div style={{
      background: "#fff", borderRadius: 28, padding: twoCol ? "34px 26px" : isTablet ? "28px 22px" : "24px 18px",
      boxShadow: "0 9px 0 rgba(0,0,0,0.06)", borderTop: `7px solid ${topic.color}`,
      display: "flex", flexDirection: "column", justifyContent: "center", flex: twoCol ? 1 : undefined, marginBottom: twoCol ? 0 : 16,
    }}>
      <p onClick={() => speak(problemSpeech(problem))} title="לחצי להקראת השאלה"
        style={{ textAlign: "center", color: "#6b7280", fontSize: S.prompt, margin: "0 0 16px", lineHeight: 1.5, cursor: "pointer" }} dir="rtl">
        <span style={{ fontSize: isTablet ? 18 : 16, marginInlineEnd: 6 }}>🔊</span>{problem.prompt}
      </p>
      <div style={{ minHeight: 56, display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center", gap: 14, fontSize: S.expr, color: "#1f2937" }}>
        {problem.text != null ? (() => {
          const tlen = stripNiqqud(problem.text).length;
          const tfs = tlen > 14 ? (isTablet ? 40 : 30) : tlen > 6 ? (isTablet ? 64 : 48) : (isTablet ? 92 : 72);
          return (
          <button onClick={() => speak(problem.say || problem.text)} title="לחצי לשמיעה"
            style={{ fontFamily: "inherit", cursor: "pointer", border: `2px dashed ${topic.color}55`, background: "#fafafa",
              borderRadius: 18, padding: isTablet ? "14px 28px" : "12px 20px", color: "#1f2937", fontWeight: 800,
              fontSize: tfs, lineHeight: 1.6,
              direction: "rtl", touchAction: "manipulation", WebkitTapHighlightColor: "transparent", maxWidth: "100%" }}>
            {problem.text} <span style={{ fontSize: isTablet ? 26 : 22 }}>🔊</span>
          </button>
          );
        })() : problem.figure ? <Figure fig={problem.figure} color={topic.color} />
          : problem.vertical ? <Vertical data={problem.vertical} color={topic.color} big={isTablet} />
          : (problem.expr && problem.expr.length > 0) ? <MathLine parts={problem.expr} /> : null}
        {problem.say != null && problem.text == null && (
          <button onClick={() => speak(problem.say)}
            style={{ fontFamily: "inherit", cursor: "pointer", border: "none", background: topic.color, color: "#fff",
              borderRadius: 18, padding: isTablet ? "16px 34px" : "13px 26px", fontWeight: 800, fontSize: isTablet ? 24 : 20,
              boxShadow: "0 5px 0 rgba(0,0,0,0.13)", touchAction: "manipulation", WebkitTapHighlightColor: "transparent" }}>
            {problem.listenLabel || "🔊 שמיעה"}
          </button>
        )}
      </div>
      <div style={{ marginTop: 20, display: "flex", justifyContent: "center" }}>
        <div dir="ltr" style={{
          minWidth: isTablet ? 190 : 150, minHeight: isTablet ? 72 : 56, padding: "8px 22px", borderRadius: 18,
          border: `3px solid ${feedback === "ok" ? "#52c41a" : feedback === "no" ? "#ff4d4f" : "#e5e7eb"}`,
          background: "#fafafa", display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: isTablet ? 38 : 30, fontWeight: 800, color: "#1f2937", userSelect: "none",
        }}>
          {input === "" ? <span style={{ color: "#cbd5e1" }}>?</span> : renderInput(input, problem.kind)}

      </div>
      {feedback === "ok" && <p style={{ textAlign: "center", color: "#389e0d", fontWeight: 800, fontSize: isTablet ? 24 : 20, margin: "16px 0 0" }}>🎉 נכון מאוד! +{level.stars} ⭐</p>}
      {feedback === "no" && <p style={{ textAlign: "center", color: "#cf1322", fontWeight: 700, fontSize: isTablet ? 19 : 17, margin: "16px 0 0" }} dir="rtl">לא בדיוק — נסי שוב, או הציצי ברמז 💡</p>}

  const padColumn = (
    <div style={{ display: "flex", flexDirection: "column", justifyContent: "center", gap: 18, flex: twoCol ? 1 : undefined }}>

          const cfs = isReading ? (longest <= 2 ? (isTablet ? 50 : 40) : longest <= 6 ? (isTablet ? 36 : 30) : (isTablet ? 26 : 22)) : (isTablet ? 22 : 19);
          const ch = isReading ? (longest <= 6 ? (isTablet ? 92 : 76) : (isTablet ? 78 : 64)) : (isTablet ? 70 : 58);
          return (
          <div style={{ display: "grid", gridTemplateColumns: problem.choices.length > 2 ? "repeat(2,1fr)" : "1fr", gap: isTablet ? 14 : 10, width: "100%", maxWidth: 440, margin: "0 auto" }}>
            {problem.choices.map((opt) => (
              <button key={opt} onClick={() => { setInput(opt); if (problem.speakChoices) speak(problem.speakMap ? problem.speakMap[opt] : opt); }}
                style={{ fontFamily: "inherit", cursor: "pointer", border: input === opt ? "3px solid #36cfc9" : "2px solid #e5e7eb",
                  borderRadius: 16, height: ch, fontSize: cfs, fontWeight: 800, lineHeight: 1.5,
                  background: input === opt ? "#e6fffb" : "#fff", color: "#1f2937", boxShadow: "0 4px 0 rgba(0,0,0,0.08)",
                  direction: "rtl", touchAction: "manipulation", WebkitTapHighlightColor: "transparent" }}>{opt}</button>

            <button onClick={check} style={{ gridColumn: "1 / -1", fontFamily: "inherit", cursor: "pointer", border: "none",
              borderRadius: 16, height: isTablet ? 64 : 54, fontSize: isTablet ? 24 : 21, fontWeight: 800, background: "#52c41a", color: "#fff",
              boxShadow: "0 5px 0 rgba(0,0,0,0.13)", touchAction: "manipulation" }}>✓ בדיקה</button>

        ? (
          <div style={{ display: "flex", flexDirection: "column", gap: 16, alignItems: "center", width: "100%" }}>
            <NumberLine max={problem.numMax} value={input} setValue={(v) => setInput(String(v))} color={topic.color} isTablet={isTablet} />
            <button onClick={check} style={{ fontFamily: "inherit", cursor: "pointer", border: "none", width: "100%", maxWidth: 440,
              borderRadius: 16, height: isTablet ? 64 : 54, fontSize: isTablet ? 24 : 21, fontWeight: 800, background: "#52c41a", color: "#fff",
              boxShadow: "0 5px 0 rgba(0,0,0,0.13)", touchAction: "manipulation" }}>✓ בדיקה</button>
          </div>
        )
        : <NumPad mode={padMode} onKey={handleKey} isTablet={isTablet} landscape={landscape} />)}
      <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
        {feedback === "ok" ? (
          <ActionBtn onClick={() => newProblem(topic, level)} bg={topic.color} color="#fff" isTablet={isTablet}>תרגיל הבא ←</ActionBtn>
        ) : (
          <>
            <ActionBtn onClick={() => setShowHint((s) => !s)} bg="#fff7e6" color="#d46b08" isTablet={isTablet}>💡 רמז</ActionBtn>
            <ActionBtn onClick={() => setShowSol((s) => !s)} bg="#f0f0f0" color="#595959" isTablet={isTablet}>📖 פתרון</ActionBtn>
            <ActionBtn onClick={() => newProblem(topic, level)} bg="#fff" color="#8c8c8c" isTablet={isTablet}>↻ תרגיל אחר</ActionBtn>
          </>
        )}
      </div>
      {showHint && feedback !== "ok" && <Note bg="#fffbe6" border="#ffe58f" isTablet={isTablet}>💡 {problem.hint}</Note>}
      {showSol && feedback !== "ok" && (
        <div dir="rtl" style={{ background: "#f9f0ff", border: "2px solid #d3adf7", borderRadius: 16, padding: isTablet ? "16px 18px" : "14px 16px" }}>
          <div style={{ fontWeight: 800, color: "#722ed1", marginBottom: 8, fontSize: isTablet ? 17 : 15 }}>📖 פתרון שלב אחר שלב:</div>
          <StepLines lines={problem.explanation} big={isTablet} />
          <div style={{ marginTop: 10, fontSize: isTablet ? 18 : 16, fontWeight: 800, display: "flex", alignItems: "center", gap: 4 }} dir="ltr"><span>תשובה:</span> {renderMathText(problem.answerText, isTablet ? 0.9 : 0.85)}</div>
        </div>
      )}
    </div>
  );

  return (
    <Shell {...sp}>
      <BackBtn onClick={() => setScreen("level")} isTablet={isTablet} />
      <div style={{ textAlign: "center", marginBottom: 12 }}>
        <span style={{ fontSize: isTablet ? 18 : 15, fontWeight: 700, color: topic.color }}>{topic.emoji} {topic.title} · {level.badge} {level.name}</span>
      </div>
      <div style={{ display: "flex", flexDirection: twoCol ? "row-reverse" : "column", gap: twoCol ? 24 : 0, alignItems: "stretch" }}>
        {questionCard}
        {padColumn}
      </div>

  );
}

function renderInput(input, kind) {
  if (kind === "fraction" && input.includes("/")) {
    const [n, d] = input.split("/");
    return <span style={{ display: "inline-flex", alignItems: "center" }}><Frac n={n || "?"} d={d || "?"} /></span>;
  }
  return <span>{input}</span>;
}

/* ---------- דף טיוטה לכתיבה עם עט (S Pen) — דפים נפרדים, בלי גלילה ---------- */
function ScratchPad({ isTablet, open, setOpen }) {
  const [color, setColor] = useState("#1f2937");
  const [erase, setErase] = useState(false);
  const [pageCount, setPageCount] = useState(1);
  const [pageIndex, setPageIndex] = useState(0);
  const canvasRef = useRef(null);
  const ctxRef = useRef(null);
  const drawing = useRef(false);
  const last = useRef(null);
  const pagesRef = useRef([null]); // dataURL לכל דף
  const idxRef = useRef(0);

  const setup = useCallback(() => {
    const canvas = canvasRef.current; if (!canvas) return;
    const rect = canvas.getBoundingClientRect();
    const ratio = window.devicePixelRatio || 1;
    canvas.width = Math.max(1, Math.floor(rect.width * ratio));
    canvas.height = Math.max(1, Math.floor(rect.height * ratio));
    const ctx = canvas.getContext("2d");
    ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    ctx.lineCap = "round"; ctx.lineJoin = "round";
    ctxRef.current = ctx;
  }, []);

  const clearCanvas = () => {
    const c = canvasRef.current, ctx = ctxRef.current; if (!c || !ctx) return;
    ctx.save(); ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.clearRect(0, 0, c.width, c.height); ctx.restore();
  };
  const restore = (idx) => {
    clearCanvas();
    const d = pagesRef.current[idx]; if (!d) return;
    const img = new Image();
    img.onload = () => { const c = canvasRef.current, ctx = ctxRef.current; if (!c || !ctx) return; ctx.save(); ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.drawImage(img, 0, 0, c.width, c.height); ctx.restore(); };
    img.src = d;
  };
  const snapshot = () => { const c = canvasRef.current; if (c) { try { pagesRef.current[idxRef.current] = c.toDataURL(); } catch (_) {} } };

  useEffect(() => {
    if (!open) return;
    const id = requestAnimationFrame(() => { setup(); restore(idxRef.current); });
    const onR = () => { snapshot(); setup(); restore(idxRef.current); };
    window.addEventListener("resize", onR);
    window.addEventListener("orientationchange", onR);
    return () => { cancelAnimationFrame(id); window.removeEventListener("resize", onR); window.removeEventListener("orientationchange", onR); };
  }, [open, setup]);

  const pos = (e) => { const r = canvasRef.current.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; };
  const isPenErase = (e) => (e.buttons & 2) !== 0 || (e.buttons & 32) !== 0;
  const drawSeg = (a, b, e) => {
    const ctx = ctxRef.current; if (!ctx) return;
    const doErase = erase || isPenErase(e);
    ctx.globalCompositeOperation = doErase ? "destination-out" : "source-over";
    ctx.strokeStyle = color;
    const pr = e.pressure && e.pressure > 0 ? e.pressure : 0.5;
    ctx.lineWidth = doErase ? 30 : (e.pointerType === "pen" ? 1.4 + pr * 4.5 : 2.8);
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
  };
  const down = (e) => {
    if (e.pointerType === "touch") return; // אצבע לא מציירת ולא גוללת את הדף
    e.preventDefault();
    drawing.current = true;
    const p = pos(e); last.current = p;
    drawSeg(p, { x: p.x + 0.01, y: p.y + 0.01 }, e);
    try { canvasRef.current.setPointerCapture(e.pointerId); } catch (_) {}
  };
  const move = (e) => {
    if (!drawing.current || e.pointerType === "touch") return;
    e.preventDefault();
    const evs = e.getCoalescedEvents ? e.getCoalescedEvents() : null;
    const list = evs && evs.length ? evs : [e];
    let prev = last.current;
    for (const ev of list) { const p = pos(ev); drawSeg(prev, p, e); prev = p; }
    last.current = prev;
  };
  const up = () => { drawing.current = false; last.current = null; };

  const clearPage = () => { clearCanvas(); pagesRef.current[idxRef.current] = null; };
  const goTo = (ni) => { snapshot(); idxRef.current = ni; setPageIndex(ni); restore(ni); };
  const newPage = () => { snapshot(); pagesRef.current.push(null); const ni = pagesRef.current.length - 1; idxRef.current = ni; setPageCount(pagesRef.current.length); setPageIndex(ni); clearCanvas(); };
  const prevPage = () => { if (idxRef.current > 0) goTo(idxRef.current - 1); };
  const nextPage = () => { if (idxRef.current < pagesRef.current.length - 1) goTo(idxRef.current + 1); };

  const tbtn = { fontFamily: "inherit", cursor: "pointer", border: "none", borderRadius: 10, padding: "5px 11px", fontSize: 13, fontWeight: 800, background: "#f0f0f0", color: "#595959", touchAction: "manipulation" };
  const navbtn = (dis) => ({ ...tbtn, opacity: dis ? 0.4 : 1, padding: "5px 12px" });

  if (!open) {
    return (
      <button onClick={() => setOpen(true)}
        style={{ position: "fixed", bottom: 16, insetInlineStart: 16, zIndex: 60, fontFamily: "inherit", cursor: "pointer",
          border: "none", borderRadius: 16, padding: "12px 18px", fontSize: 16, fontWeight: 800, background: "#36cfc9", color: "#fff",
          boxShadow: "0 5px 14px rgba(0,0,0,0.2)", touchAction: "manipulation", WebkitTapHighlightColor: "transparent" }}>
        ✏️ דף טיוטה
      </button>
    );
  }

  const palette = ["#1f2937", "#0958d9", "#cf1322"];
  const gridBg = "repeating-linear-gradient(#eef2f7 0 1px, transparent 1px 26px), repeating-linear-gradient(90deg, #eef2f7 0 1px, transparent 1px 26px)";
  return (
    <div dir="rtl" style={{ position: "fixed", left: 0, right: 0, bottom: 0, height: "50vh", zIndex: 60, background: "#fff",
      borderTop: "3px solid #36cfc9", boxShadow: "0 -10px 30px rgba(0,0,0,0.15)", display: "flex", flexDirection: "column" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 7, padding: "5px 10px", borderBottom: "1px solid #eee", flexWrap: "wrap" }}>
        <div style={{ display: "flex", gap: 5 }}>
          {palette.map((c) => (
            <button key={c} onClick={() => { setColor(c); setErase(false); }}
              style={{ width: 26, height: 26, borderRadius: "50%", background: c, cursor: "pointer",
                border: (!erase && color === c) ? "3px solid #36cfc9" : "2px solid #ddd", touchAction: "manipulation" }} />
          ))}
        </div>
        <button onClick={() => setErase((e) => !e)} style={{ ...tbtn, background: erase ? "#fff7e6" : "#f0f0f0", color: erase ? "#d46b08" : "#595959" }}>🧽</button>
        <button onClick={clearPage} style={tbtn}>🗑️</button>
        <span style={{ width: 1, height: 22, background: "#eee" }} />
        <button onClick={prevPage} style={navbtn(pageIndex === 0)}>‹</button>
        <span style={{ fontSize: 13, fontWeight: 800, color: "#595959", minWidth: 56, textAlign: "center" }}>דף {pageIndex + 1}/{pageCount}</span>
        <button onClick={nextPage} style={navbtn(pageIndex === pageCount - 1)}>›</button>
        <button onClick={newPage} style={{ ...tbtn, background: "#e6fffb", color: "#08979c" }}>➕ דף</button>
        <button onClick={() => setOpen(false)} style={{ ...tbtn, marginInlineStart: "auto" }}>✕ סגור</button>
      </div>
      <div style={{ flex: 1, position: "relative", backgroundImage: gridBg, overflow: "hidden" }}>
        <canvas ref={canvasRef} onPointerDown={down} onPointerMove={move} onPointerUp={up} onPointerCancel={up}
          style={{ position: "absolute", inset: 0, width: "100%", height: "100%", touchAction: "none", cursor: "crosshair" }} />
      </div>
    </div>
  );
}

/* ---------- מעטפת ועזר ---------- */
function Shell({ children, stars, streak, solved, isTablet, landscape, player, onSwitch }) {
  const [padOpen, setPadOpen] = useState(false);
  const outerPad = isTablet ? (landscape ? "20px 32px 40px" : "18px 22px 40px") : "16px 14px 50px";
  return (
    <div dir="rtl" style={{
      minHeight: "100vh", fontFamily: "'Varela Round', system-ui, sans-serif", touchAction: "manipulation", WebkitTextSizeAdjust: "100%",
      background: "radial-gradient(circle at 18% 8%, #fef3c7 0%, transparent 38%), radial-gradient(circle at 88% 26%, #dbeafe 0%, transparent 42%), linear-gradient(180deg,#f8fafc,#eef2ff)",
    }}>
      <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Varela+Round&display=swap" rel="stylesheet" />
      <div style={{
        padding: outerPad, boxSizing: "border-box",
        ...(padOpen ? { height: "50vh", overflowY: "auto", WebkitOverflowScrolling: "touch", overscrollBehavior: "contain" } : {}),
      }}>
        <div style={{ maxWidth: isTablet ? (landscape ? 1180 : 760) : 560, margin: "0 auto" }}>
          <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: isTablet ? 14 : 10, marginBottom: 16, flexWrap: "wrap" }}>
            {player && (
              <button onClick={onSwitch} title="החלף שחקן" style={{ fontFamily: "inherit", cursor: "pointer", border: "none", background: "#fff", borderRadius: 16, padding: isTablet ? "9px 16px" : "6px 12px", boxShadow: "0 3px 0 rgba(0,0,0,0.06)", fontSize: isTablet ? 16 : 14, fontWeight: 800, color: "#36cfc9", touchAction: "manipulation" }}>👤 {player} ⇆</button>
            )}
            <Stat label="כוכבים" val={`⭐ ${stars}`} isTablet={isTablet} />
            <Stat label="רצף" val={`🔥 ${streak}`} isTablet={isTablet} />
            <Stat label="נפתרו" val={`✅ ${solved}`} isTablet={isTablet} />
          </div>
          {children}
        </div>
      </div>
      <ScratchPad isTablet={isTablet} open={padOpen} setOpen={setPadOpen} />
    </div>
  );
}
function Stat({ label, val, isTablet }) {
  return (
    <div style={{ background: "#fff", borderRadius: 16, padding: isTablet ? "9px 20px" : "6px 14px", boxShadow: "0 3px 0 rgba(0,0,0,0.06)", textAlign: "center", minWidth: isTablet ? 100 : 78 }}>
      <div style={{ fontSize: isTablet ? 22 : 18, fontWeight: 800, color: "#1f2937" }}>{val}</div>
      <div style={{ fontSize: isTablet ? 12 : 11, color: "#9ca3af" }}>{label}</div>
    </div>
  );
}
function BackBtn({ onClick, isTablet }) {
  return (
    <button onClick={onClick} style={{
      fontFamily: "inherit", cursor: "pointer", border: "none", background: "transparent",
      color: "#6b7280", fontSize: isTablet ? 18 : 16, fontWeight: 700, marginBottom: 6, padding: 5,
      touchAction: "manipulation", userSelect: "none", WebkitTapHighlightColor: "transparent",
    }}>→ חזרה</button>
  );
}
function ActionBtn({ children, onClick, bg, color, isTablet }) {
  return (
    <button onClick={onClick} style={{
      fontFamily: "inherit", cursor: "pointer", border: "none", borderRadius: 16,
      padding: isTablet ? "14px 22px" : "12px 18px", fontSize: isTablet ? 18 : 16, fontWeight: 800, background: bg, color,
      boxShadow: "0 4px 0 rgba(0,0,0,0.10)", touchAction: "manipulation", userSelect: "none", WebkitTapHighlightColor: "transparent",
    }}>{children}</button>
  );
}
function Note({ children, bg, border, isTablet }) {
  return (
    <div dir="rtl" style={{ background: bg, border: `2px solid ${border}`, borderRadius: 16, padding: isTablet ? "16px 18px" : "14px 16px", fontSize: isTablet ? 18 : 16, lineHeight: 1.6, color: "#1f2937" }}>{children}</div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));

</script>

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); });
}
</script>
